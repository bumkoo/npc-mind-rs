[package]
name = "npc-mind"
version = "0.1.0"
edition = "2024"
description = "NPC Psychological Engine: HEXACO personality → OCC emotion → LLM guide"

[features]
default = []
embed = ["dep:bge-m3-onnx-rust"]
mind-studio = ["dep:axum", "dep:tokio", "dep:tower-http", "dep:tracing-subscriber"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
tracing = "0.1"
bge-m3-onnx-rust = { path = "../bge-m3-onnx-rust", optional = true }
tracing-subscriber = { version = "0.3", optional = true }
axum = { version = "0.8", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }
tower-http = { version = "0.6", features = ["cors", "fs"], optional = true }

[dev-dependencies]
approx = "0.5"

[[bin]]
name = "npc-mind-studio"
path = "src/bin/mind-studio/main.rs"
required-features = ["mind-studio"]
