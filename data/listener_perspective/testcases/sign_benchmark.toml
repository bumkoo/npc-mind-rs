# 부호 축 분류기 벤치마크 테스트 케이스
#
# sign_keep.toml / sign_invert.toml 프로토타입과 중복 금지 (데이터 누수 방지).
# expected_* 라벨 임의 변경 금지. 변경 시 Bekay 확인 필수.
#
# 배분: easy 10 / medium 10 / hard 6
#
# Phase 2 필드:
#   listener_p_magnitude — "weak" | "normal" | "strong"
#   speaker_p_value       — 표면 톤 P_S 수동 f32 (-1.0~1.0)
#                           Phase 2 순수 변환식 검증용 (PadAnalyzer 격리)
#
# 상세: docs/emotion/sign-classifier-design.md §3.1, §4.4

[meta]
language = "ko"
register = "wuxia"
version = "3"
last_updated = "2026-04-19"

