[package]
name = "npc-mind"
version = "0.1.0"
edition = "2021"
description = "NPC Psychological Engine: HEXACO personality → OCC emotion → LLM guide"

[features]
default = []
embed = ["fastembed", "anyhow"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
fastembed = { version = "5", optional = true }
anyhow = { version = "1", optional = true }

[dev-dependencies]
approx = "0.5"
