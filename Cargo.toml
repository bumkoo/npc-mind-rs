[package]
name = "npc-mind"
version = "0.1.0"
edition = "2021"
description = "NPC Psychological Engine: HEXACO personality → OCC emotion → LLM guide"

[features]
default = []
embed = ["dep:bge-m3-onnx-rust"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
bge-m3-onnx-rust = { path = "../bge-m3-onnx-rust", optional = true }

[dev-dependencies]
approx = "0.5"
