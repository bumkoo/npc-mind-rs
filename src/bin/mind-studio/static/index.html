            // --- App ---
            function App() {
                const [npcs, setNpcs] = useState([]);
                const [rels, setRels] = useState([]);
                const [objects, setObjects] = useState([]);
                const [scenarios, setScenarios] = useState([]);
                const [scenarioMeta, setScenarioMeta] = useState(null);
                const [connected, setConnected] = useState(false);
                const [result, setResult] = useState(null);
                const [traceHistory, setTraceHistory] = useState([]);
                const [history, setHistory] = useState([]);
                const [savedSituation, setSavedSituation] = useState(null);
                const [loading, setLoading] = useState(false);
                const [sceneInfo, setSceneInfo] = useState(null);
                const [llmModelInfo, setLlmModelInfo] = useState(null);
                const { toasts, toast } = useToast();

                // Selection state
                const [npcId, setNpcId] = useState("");
                const [partnerId, setPartnerId] = useState("");

                // Modal state: {type:'npc'|'rel'|'obj', data:...} or null
                const [modal, setModal] = useState(null);

                // Chat state
                const [chatMode, setChatMode] = useState(false);
                const [chatSessionId, setChatSessionId] = useState(null);
                const [chatMessages, setChatMessages] = useState([]);
                const [chatLoading, setChatLoading] = useState(false);
                const [chatScenarioTurns, setChatScenarioTurns] = useState([]);
                const [chatScenarioIdx, setChatScenarioIdx] = useState(0);
                const [chatEnded, setChatEnded] = useState(false); // 대화 종료 후 잠금 상태
                const [selectedMsgIdx, setSelectedMsgIdx] = useState(null);
                const [stimulusUtterance, setStimulusUtterance] = useState("");
                const [resultTab, setResultTab] = useState("emotions");
                // 결과 뷰 모드 (테스트 결과 읽기전용 로드)
                const [resultViewMode, setResultViewMode] = useState(false); // 결과 로드됨
                const [resultViewActive, setResultViewActive] = useState(false); // 대화 뷰 표시중
                const [resultTurnHistory, setResultTurnHistory] = useState([]);
                const [resultMessages, setResultMessages] = useState([]);
                const [resultSelectedIdx, setResultSelectedIdx] = useState(null);
                const [testReport, setTestReport] = useState("");

                const refresh = useCallback(async () => {
                    try {
                        const [n, r, o, s, h, sm, si, tr] = await Promise.all([
                            api.get("/api/npcs"),
                            api.get("/api/relationships"),
                            api.get("/api/objects"),
                            api.get("/api/scenarios"),
                            api.get("/api/history"),
                            api.get("/api/scenario-meta"),
                            api.get("/api/scene-info"),
                            api.get("/api/test-report"),
                        ]);
                        setNpcs(n);
                        setRels(r);
                        setObjects(o);
                        setScenarios(s);
                        setHistory(h);
                        setScenarioMeta(sm && sm.name ? sm : null);
                        setSceneInfo(si && si.has_scene ? si : null);
                        setTestReport(tr?.content || "");
                        setConnected(true);
                    } catch (e) {
                        setConnected(false);
                    }
                }, []);

                useEffect(() => {
                    refresh();
                }, [refresh]);

                // Sidebar → NPC selection syncs to situation panel
                const handleSelectNpc = (id) => setNpcId(id);

                // --- CRUD handlers (대화 중/종료 후 수정 차단) ---
                const guardChat = () => {
                    if (chatMode) { toast("대화 중에는 수정할 수 없습니다", "error"); return true; }
                    if (chatEnded) { toast("결과를 저장하거나 시나리오를 다시 로드하세요", "error"); return true; }
                    return false;
                };
                const saveNpc = async (data) => {
                    if (guardChat()) return;
                    await api.post("/api/npcs", data);
                    setModal(null);
                    refresh();
                };
                const deleteNpc = async (id) => {
                    if (guardChat()) return;
                    await api.del(`/api/npcs/${id}`);
                    setModal(null);
                    if (npcId === id) setNpcId("");
                    refresh();
                };
                const saveRel = async (data) => {
                    if (guardChat()) return;
                    await api.post("/api/relationships", data);
                    setModal(null);
                    refresh();
                };
                const deleteRel = async (oid, tid) => {
                    if (guardChat()) return;
                    await api.del(`/api/relationships/${oid}/${tid}`);
                    setModal(null);
                    refresh();
                };
                const saveObj = async (data) => {
                    if (guardChat()) return;
                    await api.post("/api/objects", data);
                    setModal(null);
                    refresh();
                };
                const deleteObj = async (id) => {
                    if (guardChat()) return;
                    await api.del(`/api/objects/${id}`);
                    setModal(null);
                    refresh();
                };
                // --- Pipeline handlers ---
                const handleAppraise = async (situation) => {
                    if (!npcId || !partnerId)
                        return toast("NPC와 대화 상대를 선택하세요", "error");
                    setLoading(true);
                    try {
                        const res = await fetch("/api/appraise", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                npc_id: npcId,
                                partner_id: partnerId,
                                situation,
                            }),
                        });
                        if (!res.ok) {
                            toast("오류: " + (await res.text()), "error");
                            return;
                        }
                        const data = await res.json();
                        setResult(data);
                        setTraceHistory([
                            { label: "appraise", trace: data.trace || [] },
                        ]);
                        refresh(); // history updated
                    } catch (e) {
                        toast("요청 실패: " + e, "error");
                    } finally {
                        setLoading(false);
                    }
                };

                const handleStimulus = async ({
                    pleasure,
                    arousal,
                    dominance,
                    situation_description,
                }) => {
                    if (!npcId || !partnerId)
                        return toast("NPC와 대화 상대를 선택하세요", "error");
                    if (!result)
                        return toast("감정 평가를 먼저 실행하세요", "error");
                    setLoading(true);
                    try {
                        const res = await fetch("/api/stimulus", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                npc_id: npcId,
                                partner_id: partnerId,
                                pleasure,
                                arousal,
                                dominance,
                                situation_description,
                            }),
                        });
                        if (!res.ok) {
                            toast("오류: " + (await res.text()), "error");
                            return;
                        }
                        const data = await res.json();
                        setResult(data);
                        setTraceHistory((prev) => [
                            ...prev,
                            { label: "stimulus", trace: data.trace || [] },
                        ]);
                        refresh();
                    } catch (e) {
                        toast("요청 실패: " + e, "error");
                    } finally {
                        setLoading(false);
                    }
                };
                const handleGuide = async () => {
                    if (!npcId || !partnerId) return;
                    try {
                        const data = await api.postJson("/api/guide", {
                            npc_id: npcId,
                            partner_id: partnerId,
                            situation_description: null,
                        });
                        setResult((prev) =>
                            prev && !prev.afterDialogue
                                ? { ...prev, prompt: data.prompt }
                                : prev,
                        );
                    } catch (e) {
                        toast("가이드 재생성 실패: " + e, "error");
                    }
                };

                const handleAfterDialogue = async (sig) => {
                    if (!npcId || !partnerId)
                        return toast("NPC와 대화 상대를 선택하세요", "error");
                    try {
                        const res = await fetch("/api/after-dialogue", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                npc_id: npcId,
                                partner_id: partnerId,
                                significance: sig,
                            }),
                        });
                        if (!res.ok) {
                            toast("오류: " + (await res.text()), "error");
                            return;
                        }
                        const data = await res.json();
                        setResult((prev) => ({
                            ...(prev || {}),
                            afterDialogue: true,
                            npc_id: npcId,
                            partner_id: partnerId,
                            ...data,
                        }));
                        refresh();
                    } catch (e) {
                        toast("요청 실패: " + e, "error");
                    }
                };

                // --- Chat handlers ---
                const handleStartChat = async (situation) => {
                    if (!npcId || !partnerId)
                        return toast("NPC와 대화 상대를 선택하세요", "error");
                    // 대화 종료 후 잠금 상태면 차단
                    if (chatEnded) {
                        toast("테스트 결과를 저장하거나 시나리오를 다시 로드하세요", "error");
                        return;
                    }
                    // 시나리오 변경 있으면 먼저 저장 요구
                    try {
                        const dirRes = await fetch("/api/save-dir");
                        if (dirRes.ok) {
                            const info = await dirRes.json();
                            if (info.scenario_modified) {
                                const ok = await saveScenario();
                                if (!ok) return; // 저장 취소 → 대화 시작 취소
                                await refresh();
                            }
                        }
                    } catch (_) {}
                    const sessionId = `chat-${Date.now()}`;
                    setChatLoading(true);
                    try {
                        const res = await fetch("/api/chat/start", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                session_id: sessionId,
                                appraise: {
                                    npc_id: npcId,
                                    partner_id: partnerId,
                                    situation,
                                },
                            }),
                        });
                        if (!res.ok) {
                            toast("대화 시작 실패: " + (await res.text()), "error");
                            return;
                        }
                        const data = await res.json();
                        setChatSessionId(sessionId);
                        setChatMode(true);
                        setResultTab("emotions");
                        setResult(data.appraise);
                        setLlmModelInfo(data.llm_model_info || null);
                        setTraceHistory([
                            { label: "chat/start", trace: data.appraise.trace || [] },
                        ]);

                        // 초기 시스템 메시지
                        const initEmotions = {};
                        (data.appraise.emotions || []).forEach((e) => {
                            initEmotions[e.emotion_type] = e.intensity;
                        });
                        setChatMessages([
                            {
                                role: "system",
                                content: `대화 시작 — ${data.appraise.dominant?.emotion_type || "neutral"} (${(data.appraise.mood || 0).toFixed(3)})`,
                                emotions: initEmotions,
                                mood: data.appraise.mood,
                                snapshot: { ...data.appraise, llm_model: data.llm_model_info },
                                activePrompt: data.appraise.prompt || "",
                            },
                        ]);
                        setSelectedMsgIdx(null);

                        // 시나리오 turns 로드 (sceneInfo에서)
                        if (sceneInfo && sceneInfo.turns) {
                            setChatScenarioTurns(sceneInfo.turns);
                            setChatScenarioIdx(0);
                        } else {
                            setChatScenarioTurns([]);
                            setChatScenarioIdx(0);
                        }

                        refresh();
                        toast("대화 시작", "success");
                    } catch (e) {
                        toast("요청 실패: " + e, "error");
                    } finally {
                        setChatLoading(false);
                    }
                };

                const handleChatSend = async (utterance, pad) => {
                    if (!chatSessionId) return;
                    setChatLoading(true);

                    // 현재 시점의 프롬프트 캡처 (이 응답 생성에 사용된 컨텍스트)
                    const currentPrompt = result?.prompt || "";

                    // 유저 메시지 즉시 추가
                    setChatMessages((prev) => [
                        ...prev,
                        { role: "user", content: utterance, emotions: null, mood: null },
                    ]);

                    // NPC 응답 플레이스홀더 추가 (스트리밍으로 업데이트)
                    const assistantIdx = { current: null };
                    setChatMessages((prev) => {
                        assistantIdx.current = prev.length;
                        return [
                            ...prev,
                            {
                                role: "assistant",
                                content: "",
                                emotions: null,
                                mood: null,
                                beat_changed: false,
                                new_focus: null,
                                snapshot: null,
                                activePrompt: currentPrompt,
                                streaming: true,
                            },
                        ];
                    });

                    try {
                        const body = {
                            session_id: chatSessionId,
                            npc_id: npcId,
                            partner_id: partnerId,
                            utterance,
                        };
                        if (pad) body.pad = pad;

                        const res = await fetch("/api/chat/message/stream", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body),
                        });

                        if (!res.ok) {
                            toast("대사 전송 실패: " + (await res.text()), "error");
                            // 플레이스홀더 제거
                            setChatMessages((prev) => prev.filter((_, i) => i !== assistantIdx.current));
                            return;
                        }

                        // SSE 스트림 파싱
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder();
                        let buffer = "";

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;

                            buffer += decoder.decode(value, { stream: true });
                            const lines = buffer.split("\n");
                            buffer = lines.pop(); // 마지막 미완성 라인 보존

                            let eventType = "";
                            for (const line of lines) {
                                if (line.startsWith("event: ")) {
                                    eventType = line.slice(7).trim();
                                } else if (line.startsWith("data: ")) {
                                    const data = line.slice(6);

                                    if (eventType === "token") {
                                        // 토큰 도착 → 플레이스홀더에 누적
                                        setChatMessages((prev) => {
                                            const updated = [...prev];
                                            const msg = { ...updated[assistantIdx.current] };
                                            msg.content += data;
                                            updated[assistantIdx.current] = msg;
                                            return updated;
                                        });
                                    } else if (eventType === "done") {
                                        // 완료 → 최종 결과로 업데이트
                                        const result = JSON.parse(data);
                                        const emotions = {};
                                        if (result.stimulus && result.stimulus.emotions) {
                                            result.stimulus.emotions.forEach((e) => {
                                                emotions[e.emotion_type] = e.intensity;
                                            });
                                        }

                                        setChatMessages((prev) => {
                                            const updated = [...prev];
                                            // assistant 메시지 업데이트
                                            const aIdx = assistantIdx.current;
                                            if (updated[aIdx]) {
                                                updated[aIdx] = {
                                                    ...updated[aIdx],
                                                    content: result.npc_response,
                                                    emotions: result.stimulus ? emotions : null,
                                                    mood: result.stimulus?.mood || null,
                                                    beat_changed: result.beat_changed,
                                                    new_focus: result.stimulus?.active_focus_id || null,
                                                    snapshot: result.stimulus || null,
                                                    activePrompt: result.stimulus?.prompt || currentPrompt,
                                                    streaming: false,
                                                };
                                            }
                                            // 역방향으로 가장 최근의 pad 없는 유저 메시지 찾아 저장
                                            if (result.stimulus?.input_pad) {
                                                for (let j = updated.length - 1; j >= 0; j--) {
                                                    if (updated[j]?.role === "user" && !updated[j]?.pad) {
                                                        updated[j] = {
                                                            ...updated[j],
                                                            pad: result.stimulus.input_pad,
                                                        };
                                                        console.log("[Debug] User message PAD updated:", updated[j]);
                                                        break;
                                                    }
                                                }
                                            }
                                            return updated;
                                        });

                                        // ResultPanel 업데이트
                                        if (result.stimulus) {
                                            console.log("[Debug] Stimulus response received. Input PAD:", result.stimulus.input_pad);
                                            setResult(result.stimulus);
                                            // 분석된 PAD가 있으면 우측 자극 탭 텍스트 동기화
                                            if (result.stimulus.input_pad) {
                                                setStimulusUtterance(utterance);
                                            }
                                            setTraceHistory((prev) => [
                                                ...prev,
                                                { label: "chat/message", trace: result.stimulus.trace || [] },
                                            ]);
                                        }
                                    } else if (eventType === "error") {
                                        toast("LLM 오류: " + data, "error");
                                    }
                                    eventType = "";
                                }
                            }
                        }

                        // 히스토리 싱크 (llm_model 정보 등 보완)
                        try {
                            const histRes = await fetch("/api/history");
                            if (histRes.ok) {
                                const history = await histRes.json();
                                if (history.length > 0) {
                                    const lastTurn = history[history.length - 1];
                                    setChatMessages((prev) => {
                                        const updated = [...prev];
                                        if (updated[assistantIdx.current]) {
                                            updated[assistantIdx.current].snapshot = {
                                                ...updated[assistantIdx.current].snapshot,
                                                llm_model: lastTurn.llm_model
                                            };
                                        }
                                        return updated;
                                    });
                                }
                            }
                        } catch (e) {}

                        refresh();
                    } catch (e) {
                        toast("요청 실패: " + e, "error");
                    } finally {
                        setChatLoading(false);
                    }
                };

                const handleChatNextTurn = () => {
                    if (chatScenarioIdx >= chatScenarioTurns.length) return;
                    const turn = chatScenarioTurns[chatScenarioIdx];
                    setChatScenarioIdx((prev) => prev + 1);
                    handleChatSend(turn.utterance, turn.pad || null);
                };

                const handleEndChat = async () => {
                    if (!chatSessionId) {
                        setChatMode(false);
                        return;
                    }
                    try {
                        // Scene에서 significance 가져오기
                        let significance = null;
                        try {
                            const siRes = await fetch("/api/scene-info");
                            if (siRes.ok) {
                                const si = await siRes.json();
                                if (si.has_scene && si.significance != null) {
                                    significance = si.significance;
                                }
                            }
                        } catch (_) {}

                        const body = {
                            session_id: chatSessionId,
                            after_dialogue: npcId && partnerId ? {
                                npc_id: npcId,
                                partner_id: partnerId,
                                significance: significance,
                            } : undefined,
                        };
                        const res = await fetch("/api/chat/end", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(body),
                        });
                        if (res.ok) {
                            const data = await res.json();
                            if (data.after_dialogue) {
                                setResult((prev) => ({
                                    ...(prev || {}),
                                    afterDialogue: true,
                                    npc_id: npcId,
                                    partner_id: partnerId,
                                    ...data.after_dialogue,
                                }));
                                setResultTab("emotions");
                                toast("대화 종료 — 관계 갱신 완료", "success");
                            } else {
                                setResultTab("emotions");
                                toast("대화 종료", "success");
                            }
                        }
                    } catch (e) {
                        toast("대화 종료 실패: " + e, "error");
                    }
                    setChatMode(false);
                    setChatSessionId(null);
                    setChatMessages([]);
                    setChatScenarioTurns([]);
                    setChatScenarioIdx(0);
                    setSelectedMsgIdx(null);
                    setChatEnded(true); // 대화 종료 후 잠금
                    refresh();
                };

                const handleSelectMsg = (idx) => {
                    if (selectedMsgIdx === idx) {
                        setSelectedMsgIdx(null);
                        const lastSnap = [...chatMessages].reverse().find((m) => m.snapshot);
                        if (lastSnap) setResult(lastSnap.snapshot);
                    } else {
                        setSelectedMsgIdx(idx);
                        const msg = chatMessages[idx];
                        console.log("[Debug] Selected Message:", msg);
                        if (msg) {
                            setTraceHistory(msg.trace || []);
                        }
                        if (msg && msg.snapshot) {
                            setResult(msg.snapshot);
                        } else if (msg && msg.role === "user") {
                            const nextAssistant = chatMessages[idx + 1];
                            if (nextAssistant && nextAssistant.snapshot) {
                                setResult(nextAssistant.snapshot);
                            }
                        }
                        if (msg) {
                            if (msg.role === "user" && msg.content) {
                                setStimulusUtterance(msg.content);
                            } else if (msg.role === "assistant") {
                                for (let j = idx - 1; j >= 0; j--) {
                                    if (chatMessages[j]?.role === "user" && chatMessages[j]?.content) {
                                        setStimulusUtterance(chatMessages[j].content);
                                        break;
                                    }
                                }
                            }
                        }
                    }
                };

                const handleResultSelectMsg = (idx) => {
                    if (resultSelectedIdx === idx) {
                        setResultSelectedIdx(null);
                        const lastSnap = [...resultMessages].reverse().find((m) => m.snapshot);
                        if (lastSnap) setResult(lastSnap.snapshot);
                    } else {
                        setResultSelectedIdx(idx);
                        const msg = resultMessages[idx];
                        console.log("[Debug] Selected Result Message:", msg);
                        if (msg) {
                            setTraceHistory(msg.trace || []);
                        }
                        if (msg && msg.snapshot) {
                            setResult(msg.snapshot);
                        } else if (msg && msg.role === "user") {
                            const nextAssistant = resultMessages[idx + 1];
                            if (nextAssistant && nextAssistant.snapshot) {
                                setResult(nextAssistant.snapshot);
                            }
                        }
                        if (msg) {
                            if (msg.role === "user" && msg.content) {
                                setStimulusUtterance(msg.content);
                            } else if (msg.role === "assistant") {
                                for (let j = idx - 1; j >= 0; j--) {
                                    if (resultMessages[j]?.role === "user" && resultMessages[j]?.content) {
                                        setStimulusUtterance(resultMessages[j].content);
                                        break;
                                    }
                                }
                            }
                        }
                    }
                };

                // --- Polling for MCP mode (2s interval when chatMode) ---
                useEffect(() => {
                    if (!chatMode) return;
                    const interval = setInterval(async () => {
                        try {
                            const h = await api.get("/api/history");
                            setHistory(h);
                        } catch (e) {}
                    }, 2000);
                    return () => clearInterval(interval);
                }, [chatMode]);

                // --- Save / Load ---
                // --- 저장 헬퍼 ---
                const doSave = async (path, saveType) => {
                    const res = await fetch("/api/save", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ path, save_type: saveType || null }),
                    });
                    if (res.ok) return (await res.json()).path;
                    throw new Error(await res.text());
                };

                // --- 시나리오 저장 헬퍼 (대화 시작 전 팝업에서도 재사용) ---
                const saveScenario = async () => {
                    let info = null;
                    try {
                        const dirRes = await fetch("/api/save-dir");
                        if (dirRes.ok) info = await dirRes.json();
                    } catch (_) {}
                    if (!info) { toast("시나리오를 먼저 로드하세요", "error"); return false; }
                    const { loaded_path, scenario_name, has_existing_results } = info;
                    if (has_existing_results) {
                        const displayDir = (loaded_path || "").replace(/^data\//, "").replace(/\/[^/]+$/, "/");
                        const name = prompt(`[${scenario_name}] 시나리오 저장\n기존 테스트 결과가 있어 원본을 덮어쓸 수 없습니다.\n위치: ${displayDir}\n새 파일 이름:`, "");
                        if (!name) return false;
                        const filename = name.endsWith(".json") ? name : name + ".json";
                        const parentDir = (loaded_path || "data").replace(/\/[^/]+$/, "");
                        try {
                            await doSave(`${parentDir}/${filename}`, "scenario");
                        } catch (e) { toast("시나리오 저장 실패: " + e.message, "error"); return false; }
                    } else {
                        try {
                            await doSave(loaded_path, "scenario");
                        } catch (e) { toast("시나리오 저장 실패: " + e.message, "error"); return false; }
                    }
                    toast("시나리오 저장 완료", "success");
                    return true;
                };

                const updateTestReport = async (content) => {
                    await fetch("/api/test-report", {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content }),
                    });
                    setTestReport(content);
                };

                const saveState = async () => {
                    // 0) 대화 진행 중이면 차단
                    if (chatMode) {
                        toast("대화 종료 후 저장 가능합니다", "error");
                        return;
                    }
                    // 1) 서버에서 상태 조회
                    let info = null;
                    try {
                        const dirRes = await fetch("/api/save-dir");
                        if (dirRes.ok) info = await dirRes.json();
                    } catch (_) {}
                    if (!info) { toast("시나리오를 먼저 로드하세요", "error"); return; }

                    const { dir, loaded_path, scenario_name, scenario_modified, has_turn_history, has_existing_results } = info;

                    // --- 대화 종료 후: 결과만 저장 (시나리오는 대화 시작 전에 이미 저장됨) ---
                    if (chatEnded) {
                        if (!has_turn_history) {
                            toast("저장할 대화 기록이 없습니다", "info");
                            return;
                        }
                        const displayDir = dir.replace(/^data\//, "") + "/";
                        const name = prompt(`[${scenario_name}] 테스트 결과 저장\n저장 위치: ${displayDir}\n파일 이름:`, "");
                        if (!name) return;
                        const filename = name.endsWith(".json") ? name : name + ".json";
                        try {
                            await doSave(`${dir}/${filename}`, "result");
                            toast("테스트 결과 저장 완료", "success");
                        } catch (e) { toast("결과 저장 실패: " + e.message, "error"); }
                        return;
                    }

                    // --- 대화 전: 시나리오 저장 ---
                    if (scenario_modified) {
                        const ok = await saveScenario();
                        if (!ok) return;
                        toast("시나리오 저장 완료", "success");
                        return;
                    }

                    toast("저장할 변경사항이 없습니다", "info");
                };

                const loadScenario = async (scenPath) => {
                    if (!scenPath) return;
                    const path = `data/${scenPath}`;
                    const res = await fetch("/api/load", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ path }),
                    });
                    if (res.ok) {
                        toast("시나리오 로드 완료", "success");
                        // 상태 초기화
                        setChatEnded(false);
                        setResultViewMode(false);
                        setResultViewActive(false);
                        setResultTurnHistory([]);
                        setResultMessages([]);
                        setResultSelectedIdx(null);
                        await refresh();
                        // 상황설정 복원
                        try {
                            const sit = await api.get("/api/situation");
                            // scene-info에서 significance 보완
                            try {
                                const si = await api.get("/api/scene-info");
                                if (si && si.has_scene && si.significance != null) {
                                    sit.significance = si.significance;
                                }
                            } catch (_) {}
                            if (
                                sit &&
                                typeof sit === "object" &&
                                Object.keys(sit).length > 0
                            ) {
                                setSavedSituation(sit);
                            }
                        } catch (e) {}
                        setResult(null);
                        setTraceHistory([]);
                    } else toast("로드 실패: " + (await res.text()), "error");
                };

                const loadResult = async (scenPath) => {
                    if (!scenPath) return;
                    const path = `data/${scenPath}`;
                    const res = await fetch("/api/load-result", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ path }),
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setChatEnded(false);
                        toast("테스트 결과 로드 완료", "success");
                        await refresh();
                        // 상황설정 복원
                        try {
                            const sit = await api.get("/api/situation");
                            try {
                                const si = await api.get("/api/scene-info");
                                if (si && si.has_scene && si.significance != null) {
                                    sit.significance = si.significance;
                                }
                            } catch (_) {}
                            if (sit && typeof sit === "object" && Object.keys(sit).length > 0) {
                                setSavedSituation(sit);
                            }
                        } catch (e) {}
                        // turn_history → 대화 메시지 및 LLM 모델 변환
                        const msgs = [];
                        const history = data.turn_history || [];
                        if (history.length > 0 && history[0].llm_model) {
                            setLlmModelInfo(history[0].llm_model);
                        } else {
                            setLlmModelInfo(null);
                        }
                        history.forEach((turn, i) => {
                            const resp = turn.response || {};
                            const req = turn.request || {};
                            if (turn.action === "stimulus") {
                                // stimulus 턴: 상대 대사(request) + NPC 감정 변화(response)
                                const utterance = req.situation_description || req.utterance || "";
                                const emotions = {};
                                (resp.emotions || []).forEach((e) => { emotions[e.emotion_type] = e.intensity; });
                                if (utterance) {
                                    msgs.push({
                                        role: "user",
                                        content: utterance,
                                        pad: req.pleasure != null ? { pleasure: req.pleasure, arousal: req.arousal, dominance: req.dominance } : null,
                                    });
                                }
                                msgs.push({
                                    role: "assistant",
                                    content: turn.label,
                                    emotions,
                                    mood: resp.mood,
                                    snapshot: { ...resp, llm_model: turn.llm_model },
                                    beat_changed: resp.beat_changed,
                                    new_focus: resp.active_focus_id,
                                    trace: resp.trace || [],
                                });
                            } else if (turn.action === "scene" || turn.action === "appraise" || turn.action === "chat_start") {
                                // 초기 평가
                                const emotions = {};
                                (resp.emotions || []).forEach((e) => { emotions[e.emotion_type] = e.intensity; });
                                msgs.push({
                                    role: "system",
                                    content: `${turn.label}`,
                                    emotions,
                                    mood: resp.mood,
                                    snapshot: { ...resp, llm_model: turn.llm_model },
                                    trace: resp.trace || [],
                                });
                            } else if (turn.action === "chat_message") {
                                // LLM 대화 턴 — response에 npc_response + stimulus 결과가 병합됨
                                const emotions = {};
                                (resp.emotions || []).forEach((e) => { emotions[e.emotion_type] = e.intensity; });
                                msgs.push({
                                    role: "user",
                                    content: req.utterance || "",
                                    pad: req.pad || resp.input_pad || null,
                                    trace: [],
                                });
                                console.log(`[Debug] Loaded turn ${i+1} (${turn.action}):`, {
                                    utterance: req.utterance,
                                    pad: req.pad || resp.input_pad || null
                                });
                                msgs.push({
                                    role: "assistant",
                                    content: resp.npc_response || turn.label,
                                    emotions,
                                    mood: resp.mood,
                                    snapshot: { ...resp, llm_model: turn.llm_model },
                                    beat_changed: resp.beat_changed,
                                    new_focus: resp.active_focus_id,
                                    trace: resp.trace || [],
                                });
                            } else if (turn.action === "after_dialogue") {
                                msgs.push({
                                    role: "system",
                                    content: `대화 종료 — ${turn.label}`,
                                    snapshot: resp,
                                    trace: [],
                                });
                            }
                        });
                        setResultViewMode(true);
                        setResultViewActive(false);
                        setResultTurnHistory(data.turn_history || []);
                        setResultMessages(msgs);
                        setResultSelectedIdx(null);
                        setResult(msgs.length > 0 && msgs[0].snapshot ? msgs[0].snapshot : null);
                        setResultTab("emotions");
                        setTraceHistory([]);
                    } else toast("결과 로드 실패: " + (await res.text()), "error");
                };
                return (
                    <div className="app">
                        {/* Header */}
                        <div className="header">
                            <h1>Mind Studio</h1>
                            <span className={`status ${connected ? "ok" : ""}`}>
                                {connected
                                    ? `NPC ${npcs.length} · 관계 ${rels.length} · 오브젝트 ${objects.length}`
                                    : "연결 실패"}
                            </span>
                            {scenarioMeta && (
                                <span
                                    style={{
                                        fontSize: 11,
                                        color: "var(--accent2)",
                                        padding: "2px 8px",
                                        background: "var(--bg3)",
                                        borderRadius: "var(--radius)",
                                    }}
                                    title={[
                                        scenarioMeta.description,
                                        ...(scenarioMeta.notes || []),
                                    ]
                                        .filter(Boolean)
                                        .join("\n")}
                                >
                                    {scenarioMeta.name}
                                </span>
                            )}
                            <div className="actions">
                                <select
                                    style={{
                                        background: "var(--bg3)",
                                        color: "var(--fg)",
                                        border: "1px solid var(--border)",
                                        borderRadius: "var(--radius)",
                                        padding: "3px 8px",
                                        fontSize: 11,
                                        maxWidth: 220,
                                    }}
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        if (val) {
                                            if (val.startsWith("result:")) {
                                                loadResult(val.slice(7));
                                            } else {
                                                loadScenario(val);
                                            }
                                        }
                                        e.target.value = "";
                                    }}
                                >
                                    <option value="">시나리오 로드...</option>
                                    {scenarios.filter(s => !s.has_results).length > 0 && (
                                        <optgroup label="시나리오">
                                            {scenarios.filter(s => !s.has_results).map((s) => (
                                                <option key={s.path} value={s.path}>{s.label}</option>
                                            ))}
                                        </optgroup>
                                    )}
                                    {scenarios.filter(s => s.has_results).length > 0 && (
                                        <optgroup label="테스트 결과">
                                            {scenarios.filter(s => s.has_results).map((s) => (
                                                <option key={"result:" + s.path} value={"result:" + s.path}>{s.label}</option>
                                            ))}
                                        </optgroup>
                                    )}
                                </select>
                                <button
                                    className="btn small"
                                    onClick={saveState}
                                >
                                    저장
                                </button>
                                <button className="btn small" onClick={() => window.location.reload()}>
                                    새로고침
                                </button>
                            </div>
                        </div>

                        {/* Main 3-column */}
                        <div className="main">
                            <Sidebar
                                npcs={npcs}
                                rels={rels}
                                objects={objects}
                                selectedNpcId={npcId}
                                onSelectNpc={handleSelectNpc}
                                disabled={chatMode || chatEnded}
                                disabledMsg={chatMode ? "대화 중에는 수정할 수 없습니다" : chatEnded ? "결과 저장 또는 시나리오 로드 필요" : ""}
                                onEditNpc={(n) => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "npc", data: n });
                                }}
                                onEditRel={(r) => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "rel", data: r });
                                }}
                                onEditObj={(o) => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "obj", data: o });
                                }}
                                onNewNpc={() => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "npc", data: null });
                                }}
                                onNewRel={() => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "rel", data: null });
                                }}
                                onNewObj={() => {
                                    if (chatMode) return toast("대화 중에는 수정할 수 없습니다", "error");
                                    setModal({ type: "obj", data: null });
                                }}
                            />
                            {chatMode ? (
                                <ChatPanel
                                    npcId={npcId}
                                    partnerId={partnerId}
                                    npcs={npcs}
                                    messages={chatMessages}
                                    scenarioTurns={chatScenarioTurns}
                                    scenarioIndex={chatScenarioIdx}
                                    chatLoading={chatLoading}
                                    selectedMsgIdx={selectedMsgIdx}
                                    onSend={handleChatSend}
                                    onNextTurn={handleChatNextTurn}
                                    onSelectMsg={handleSelectMsg}
                                    onEndChat={handleEndChat}
                                />
                            ) : resultViewActive && resultMessages.length > 0 ? (
                                <ResultViewPanel
                                    npcId={npcId}
                                    partnerId={partnerId}
                                    npcs={npcs}
                                    messages={resultMessages}
                                    selectedMsgIdx={resultSelectedIdx}
                                    onSelectMsg={handleResultSelectMsg}
                                    onClose={() => {
                                        setResultViewActive(false);
                                        setResultSelectedIdx(null);
                                    }}
                                />
                            ) : (
                                <SituationPanel
                                    npcs={npcs}
                                    objects={objects}
                                    npcId={npcId}
                                    setNpcId={chatEnded ? () => {} : setNpcId}
                                    partnerId={partnerId}
                                    setPartnerId={chatEnded ? () => {} : setPartnerId}
                                    onAppraise={chatEnded ? null : handleAppraise}
                                    onStartChat={
                                        chatEnded ? null :
                                        resultViewMode ? () => {
                                            if (resultMessages.length > 0) {
                                                setResultViewActive(true);
                                                setResultTab("emotions");
                                                setResult(resultMessages[0]?.snapshot || null);
                                            }
                                        } : handleStartChat
                                    }
                                    startChatLabel={resultViewMode ? "대화 로드" : null}
                                    loading={loading}
                                    savedSituation={savedSituation}
                                    sceneInfo={sceneInfo}
                                    toast={toast}
                                    disabled={chatEnded}
                                />
                            )}
                            <ResultPanel
                                result={result}
                                history={history}
                                traceHistory={traceHistory}
                                testReport={testReport}
                                onUpdateReport={updateTestReport}
                                onGuide={handleGuide}

                                onStimulus={handleStimulus}
                                toast={toast}
                                sceneInfo={sceneInfo}
                                chatMessages={resultViewActive ? resultMessages : chatMessages}
                                selectedMsgIdx={resultViewActive ? resultSelectedIdx : selectedMsgIdx}
                                stimulusUtterance={stimulusUtterance}
                                onStimulusUtteranceChange={setStimulusUtterance}
                                tab={resultTab}
                                onTabChange={setResultTab}
                                llmModelInfo={llmModelInfo}
                            />
                        </div>

                        {/* Modals */}
                        <ToastContainer toasts={toasts} />

                        {modal?.type === "npc" && (
                            <NpcModal
                                npc={modal.data}
                                onSave={saveNpc}
                                onDelete={deleteNpc}
                                onClose={() => setModal(null)}
                            />
                        )}
                        {modal?.type === "rel" && (
                            <RelModal
                                rel={modal.data}
                                npcIds={npcs.map((n) => n.id)}
                                onSave={saveRel}
                                onDelete={deleteRel}
                                onClose={() => setModal(null)}
                            />
                        )}
                        {modal?.type === "obj" && (
                            <ObjModal
                                obj={modal.data}
                                onSave={saveObj}
                                onDelete={deleteObj}
                                onClose={() => setModal(null)}
                            />
                        )}
                    </div>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
