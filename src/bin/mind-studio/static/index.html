<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mind Studio</title>
        <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            :root {
                --bg: #0f1117;
                --bg2: #1a1d28;
                --bg3: #252836;
                --bg4: #2d3040;
                --fg: #e0e0e0;
                --fg2: #9a9cb0;
                --fg3: #666880;
                --accent: #6c9cff;
                --accent2: #4ecdc4;
                --warn: #ffb74d;
                --err: #ff6b6b;
                --green: #66bb6a;
                --purple: #b388ff;
                --border: #2a2d3a;
                --radius: 6px;
                --sidebar-w: 240px;
                --center-w: 360px;
            }
            body {
                font-family:
                    "Segoe UI",
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--fg);
                font-size: 13px;
                overflow: hidden;
                height: 100vh;
            }
        </style>
        <style>
            /* Layout */
            .app {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            .header {
                padding: 8px 16px;
                background: var(--bg2);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
            }
            .header h1 {
                font-size: 15px;
                font-weight: 600;
                color: var(--accent);
            }
            .header .status {
                font-size: 11px;
                color: var(--fg2);
            }
            .header .status.ok::before {
                content: "● ";
                color: var(--accent2);
            }
            .header .actions {
                margin-left: auto;
                display: flex;
                gap: 6px;
                align-items: center;
            }
            .main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* Sidebar */
            .sidebar {
                width: var(--sidebar-w);
                border-right: 1px solid var(--border);
                background: var(--bg2);
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                flex-shrink: 0;
            }
            .sidebar-section {
                border-bottom: 1px solid var(--border);
            }
            .sidebar-header {
                padding: 8px 12px;
                font-size: 11px;
                font-weight: 600;
                color: var(--fg2);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                cursor: pointer;
            }
            .sidebar-header:hover {
                background: var(--bg3);
            }
            .sidebar-header .count {
                background: var(--bg4);
                padding: 1px 6px;
                border-radius: 10px;
                font-size: 10px;
            }
            .sidebar-body {
                padding: 4px 8px 8px;
            }

            /* Sidebar items */
            .item-card {
                padding: 6px 8px;
                border-radius: 4px;
                cursor: pointer;
                margin: 2px 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .item-card:hover {
                background: var(--bg3);
            }
            .item-card.selected {
                background: var(--bg4);
                border-left: 2px solid var(--accent);
                padding-left: 6px;
            }
            .item-card .name {
                font-size: 12px;
                font-weight: 500;
            }
            .item-card .sub {
                font-size: 10px;
                color: var(--fg3);
            }
            .item-card .edit-btn {
                opacity: 0;
                font-size: 10px;
                color: var(--fg3);
                cursor: pointer;
                padding: 2px 4px;
            }
            .item-card:hover .edit-btn {
                opacity: 1;
            }
            .item-card .edit-btn:hover {
                color: var(--accent);
            }
            .add-btn {
                width: 100%;
                padding: 4px;
                border: 1px dashed var(--border);
                border-radius: 4px;
                background: none;
                color: var(--fg3);
                cursor: pointer;
                font-size: 11px;
                margin-top: 4px;
            }
            .add-btn:hover {
                border-color: var(--accent);
                color: var(--accent);
            }
        </style>
        <style>
            /* Center panel */
            .center {
                width: var(--center-w);
                border-right: 1px solid var(--border);
                overflow-y: auto;
                flex-shrink: 0;
                padding: 12px;
            }
            .center h2 {
                font-size: 13px;
                font-weight: 600;
                color: var(--accent);
                margin-bottom: 8px;
            }
            .pair-select {
                display: flex;
                gap: 6px;
                margin-bottom: 8px;
            }
            .pair-select > div {
                flex: 1;
            }

            /* Right panel */
            .right {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .result-tabs {
                display: flex;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                background: var(--bg2);
            }
            .result-tab {
                padding: 8px 16px;
                cursor: pointer;
                font-size: 12px;
                color: var(--fg3);
                border-bottom: 2px solid transparent;
            }
            .result-tab.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }
            .result-tab:hover {
                color: var(--fg);
            }
            .result-content {
                flex: 1;
                overflow-y: auto;
                padding: 12px;
            }

            /* Form elements */
            label {
                display: block;
                font-size: 11px;
                color: var(--fg2);
                margin: 4px 0 2px;
            }
            input[type="text"],
            input[type="number"],
            textarea,
            select {
                width: 100%;
                padding: 5px 8px;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--fg);
                font-size: 12px;
                outline: none;
            }
            input:focus,
            textarea:focus,
            select:focus {
                border-color: var(--accent);
            }
            textarea {
                resize: vertical;
                min-height: 36px;
                font-family: inherit;
            }

            /* Slider */
            .slider-row {
                display: flex;
                align-items: center;
                gap: 6px;
                margin: 3px 0;
            }
            .slider-row label {
                width: 52px;
                flex-shrink: 0;
                text-align: right;
                margin: 0;
                font-size: 11px;
            }
            .slider-row input[type="range"] {
                flex: 1;
                accent-color: var(--accent);
                height: 16px;
            }
            .slider-row .val {
                width: 36px;
                text-align: right;
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                color: var(--accent);
            }
        </style>
        <style>
            /* Buttons */
            .btn {
                padding: 5px 12px;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--bg3);
                color: var(--fg);
                cursor: pointer;
                font-size: 12px;
            }
            .btn:hover {
                background: var(--bg4);
            }
            .btn.primary {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff;
                font-weight: 500;
            }
            .btn.primary:hover {
                background: #5a8be6;
            }
            .btn.danger {
                border-color: var(--err);
                color: var(--err);
            }
            .btn.danger:hover {
                background: rgba(255, 107, 107, 0.1);
            }
            .btn.small {
                padding: 3px 8px;
                font-size: 11px;
            }
            .btn-row {
                display: flex;
                gap: 6px;
                margin: 6px 0;
            }
            .btn-full {
                width: 100%;
            }

            /* Section card */
            .section {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                margin-bottom: 8px;
            }
            .section-header {
                padding: 6px 10px;
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
            }
            .section-header input[type="checkbox"] {
                accent-color: var(--accent);
            }
            .section-header .title {
                font-size: 12px;
                font-weight: 500;
                color: var(--fg2);
            }
            .section-body {
                padding: 4px 10px 10px;
            }

            /* Emotion bars */
            .emotion-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 4px 0;
            }
            .emotion-row .etype {
                width: 90px;
                font-size: 11px;
                color: var(--fg);
                text-align: right;
                flex-shrink: 0;
            }
            .emotion-row .bar-bg {
                flex: 1;
                height: 18px;
                background: var(--bg3);
                border-radius: 3px;
                overflow: hidden;
                position: relative;
            }
            .emotion-row .bar-fill {
                height: 100%;
                border-radius: 3px;
                transition: width 0.3s;
            }
            .emotion-row .intensity {
                width: 40px;
                font-size: 11px;
                font-family: monospace;
                text-align: right;
                color: var(--fg2);
            }
            .emotion-row .ctx {
                font-size: 10px;
                color: var(--fg3);
                max-width: 140px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        </style>
        <style>
            /* Prompt & trace boxes */
            .prompt-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 12px;
                font-size: 12px;
                white-space: pre-wrap;
                line-height: 1.6;
                max-height: 100%;
                overflow-y: auto;
            }
            .prompt-box .label {
                font-size: 10px;
                color: var(--fg3);
                display: block;
                margin-bottom: 4px;
            }
            .trace-box {
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 10px;
                font-family: monospace;
                font-size: 11px;
                white-space: pre-wrap;
                color: var(--fg2);
                line-height: 1.5;
            }

            /* History */
            .history-item {
                padding: 8px 10px;
                border-bottom: 1px solid var(--border);
                cursor: pointer;
            }
            .history-item:hover {
                background: var(--bg3);
            }
            .history-item .hlabel {
                font-size: 12px;
                font-weight: 500;
            }
            .history-item .haction {
                font-size: 10px;
                color: var(--fg3);
            }

            /* Modal */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.6);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
            }
            .modal {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: 8px;
                width: 560px;
                max-height: 85vh;
                overflow-y: auto;
                padding: 16px;
            }
            .modal h2 {
                font-size: 14px;
                font-weight: 600;
                color: var(--accent);
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            .modal .close-btn {
                background: none;
                border: none;
                color: var(--fg3);
                cursor: pointer;
                font-size: 16px;
            }
            .modal .close-btn:hover {
                color: var(--fg);
            }
            .modal .dim-group {
                margin: 8px 0;
            }
            .modal .dim-title {
                font-size: 12px;
                font-weight: 500;
                color: var(--accent2);
                margin: 4px 0;
                display: flex;
                justify-content: space-between;
            }

            /* Dominant emotion card */
            .dominant-card {
                background: linear-gradient(
                    135deg,
                    rgba(108, 156, 255, 0.1),
                    rgba(78, 205, 196, 0.1)
                );
                border: 1px solid var(--accent);
                border-radius: var(--radius);
                padding: 10px 12px;
                margin-bottom: 10px;
            }
            .dominant-card .d-type {
                font-size: 16px;
                font-weight: 600;
                color: var(--accent);
            }
            .dominant-card .d-intensity {
                font-size: 12px;
                color: var(--fg2);
            }
            .dominant-card .d-ctx {
                font-size: 11px;
                color: var(--fg3);
                margin-top: 2px;
            }
            .mood-bar {
                font-size: 11px;
                color: var(--fg2);
                margin: 8px 0;
            }

            /* Empty state */
            .empty {
                color: var(--fg3);
                text-align: center;
                padding: 40px 20px;
                font-size: 12px;
            }

            /* After-Dialogue result */
            .rel-change {
                margin: 6px 0;
            }
            .rel-change .rc-label {
                font-size: 11px;
                color: var(--fg2);
                margin-bottom: 2px;
                display: flex;
                justify-content: space-between;
            }
            .rel-change .rc-bar {
                height: 20px;
                background: var(--bg3);
                border-radius: 3px;
                position: relative;
                overflow: hidden;
            }
            .rel-change .rc-fill {
                height: 100%;
                border-radius: 3px;
                transition: width 0.3s;
                position: absolute;
                top: 0;
            }
            .rel-change .rc-before {
                background: var(--fg3);
                opacity: 0.4;
            }
            .rel-change .rc-after {
            }
            .rel-change .rc-delta {
                font-size: 10px;
                font-family: monospace;
                margin-top: 1px;
            }

            /* Chat Panel */
            .chat-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 8px 0;
                margin-bottom: 8px;
                border-bottom: 1px solid var(--border);
            }
            .chat-header .chat-title {
                font-size: 13px;
                font-weight: 600;
                color: var(--accent);
            }
            .chat-header .chat-mode {
                font-size: 10px;
                color: var(--fg3);
                padding: 2px 6px;
                background: var(--bg3);
                border-radius: 10px;
            }
            .chat-messages {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 6px;
                padding-bottom: 8px;
            }
            .chat-msg {
                padding: 8px 10px;
                border-radius: var(--radius);
                font-size: 12px;
                cursor: pointer;
                line-height: 1.5;
                max-width: 95%;
                white-space: pre-wrap;
            }
            .chat-msg.user {
                background: var(--bg4);
                color: var(--fg);
                align-self: flex-end;
                border-bottom-right-radius: 2px;
            }
            .chat-msg.assistant {
                background: linear-gradient(135deg, rgba(108,156,255,0.08), rgba(78,205,196,0.08));
                border: 1px solid var(--border);
                align-self: flex-start;
                border-bottom-left-radius: 2px;
            }
            .chat-msg.system {
                background: rgba(179,136,255,0.08);
                border: 1px solid rgba(179,136,255,0.2);
                font-size: 11px;
                color: var(--purple);
                align-self: center;
                text-align: center;
                max-width: 100%;
            }
            .chat-msg .msg-role {
                font-size: 10px;
                font-weight: 600;
                color: var(--fg3);
                margin-bottom: 2px;
            }
            .chat-msg .msg-emotions {
                font-size: 10px;
                color: var(--accent2);
                margin-top: 4px;
                cursor: pointer;
            }
            .chat-msg .msg-emotions:hover {
                color: var(--accent);
            }
            .chat-msg.streaming::after {
                content: "▊";
                animation: blink 0.8s infinite;
                color: var(--accent);
            }
            @keyframes blink {
                0%, 100% { opacity: 1; }
                50% { opacity: 0; }
            }
            .chat-msg.selected {
                outline: 2px solid var(--accent);
                outline-offset: -2px;
            }
            .chat-beat-divider {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 6px 0;
                font-size: 11px;
                color: var(--warn);
            }
            .chat-beat-divider::before,
            .chat-beat-divider::after {
                content: '';
                flex: 1;
                border-top: 1px dashed var(--warn);
                opacity: 0.4;
            }
            .chat-input-area {
                display: flex;
                gap: 6px;
                padding-top: 8px;
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }
            .chat-input-area textarea {
                flex: 1;
                min-height: 36px;
                max-height: 80px;
                resize: none;
            }
            .chat-scenario-bar {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 0;
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }
            .chat-scenario-bar .turn-preview {
                flex: 1;
                font-size: 11px;
                color: var(--fg2);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .chat-scenario-bar .turn-count {
                font-size: 10px;
                color: var(--fg3);
                flex-shrink: 0;
            }
            .chat-loading {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 0;
                font-size: 11px;
                color: var(--fg3);
            }
            .chat-loading .dots::after {
                content: '...';
                animation: chatDots 1.2s steps(4, end) infinite;
            }
            @keyframes chatDots {
                0% { content: ''; }
                25% { content: '.'; }
                50% { content: '..'; }
                75% { content: '...'; }
            }

            /* Toast */
            .toast-container {
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 200;
                display: flex;
                flex-direction: column;
                gap: 6px;
                pointer-events: none;
            }
            .toast {
                padding: 8px 14px;
                border-radius: var(--radius);
                font-size: 12px;
                color: #fff;
                pointer-events: auto;
                animation:
                    toastIn 0.25s ease-out,
                    toastOut 0.3s ease-in 2.7s forwards;
                max-width: 320px;
            }
            .toast.success {
                background: var(--green);
            }
            .toast.error {
                background: var(--err);
            }
            .toast.info {
                background: var(--accent);
            }
            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translateX(40px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes toastOut {
                from {
                    opacity: 1;
                }
                to {
                    opacity: 0;
                    transform: translateY(-10px);
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="text/babel">
            const { useState, useEffect, useCallback, useRef } = React;

            // --- API ---
            const api = {
                get: (url) => fetch(url).then((r) => r.json()),
                post: (url, data) =>
                    fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data),
                    }),
                del: (url) => fetch(url, { method: "DELETE" }),
                postJson: (url, data) =>
                    fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data),
                    }).then((r) => r.json()),
            };

            // --- Toast ---
            function ToastContainer({ toasts }) {
                return (
                    <div className="toast-container">
                        {toasts.map((t) => (
                            <div key={t.id} className={`toast ${t.type}`}>
                                {t.msg}
                            </div>
                        ))}
                    </div>
                );
            }
            function useToast() {
                const [toasts, setToasts] = useState([]);
                const show = useCallback((msg, type = "info") => {
                    const id = Date.now() + Math.random();
                    setToasts((prev) => [...prev, { id, msg, type }]);
                    setTimeout(
                        () =>
                            setToasts((prev) =>
                                prev.filter((t) => t.id !== id),
                            ),
                        3000,
                    );
                }, []);
                return { toasts, toast: show };
            }

            // --- Helpers ---
            const emotionColor = (type) => {
                const colors = {
                    Joy: "#66bb6a",
                    Distress: "#ef5350",
                    Hope: "#4ecdc4",
                    Fear: "#ff8a65",
                    Satisfaction: "#aed581",
                    Disappointment: "#e57373",
                    Relief: "#81d4fa",
                    FearsConfirmed: "#ff7043",
                    HappyFor: "#a5d6a7",
                    Resentment: "#ef9a9a",
                    Gloating: "#ce93d8",
                    Pity: "#90caf9",
                    Pride: "#ffd54f",
                    Shame: "#bcaaa4",
                    Admiration: "#80cbc4",
                    Reproach: "#f48fb1",
                    Love: "#f06292",
                    Hate: "#b71c1c",
                    Anger: "#d32f2f",
                    Gratitude: "#66bb6a",
                    Gratification: "#ffb74d",
                    Remorse: "#9e9e9e",
                };
                return colors[type] || "var(--accent)";
            };
            // --- Slider ---
            function Slider({
                label,
                value,
                onChange,
                min = -1,
                max = 1,
                step = 0.05,
            }) {
                return (
                    <div className="slider-row">
                        <label>{label}</label>
                        <input
                            type="range"
                            min={min}
                            max={max}
                            step={step}
                            value={value}
                            onChange={(e) =>
                                onChange(parseFloat(e.target.value))
                            }
                        />
                        <span className="val">{value.toFixed(2)}</span>
                    </div>
                );
            }

            // --- NPC Edit Modal ---
            function NpcModal({ npc, onSave, onDelete, onClose }) {
                const empty = {
                    id: "",
                    name: "",
                    description: "",
                    sincerity: 0,
                    fairness: 0,
                    greed_avoidance: 0,
                    modesty: 0,
                    fearfulness: 0,
                    anxiety: 0,
                    dependence: 0,
                    sentimentality: 0,
                    social_self_esteem: 0,
                    social_boldness: 0,
                    sociability: 0,
                    liveliness: 0,
                    forgiveness: 0,
                    gentleness: 0,
                    flexibility: 0,
                    patience: 0,
                    organization: 0,
                    diligence: 0,
                    perfectionism: 0,
                    prudence: 0,

            // --- Focus 설정 기본값 생성 헬퍼 ---
            function makeFocusSettings(focusInfo) {
                const ev = focusInfo?.event;
                const ac = focusInfo?.action;
                const ob = focusInfo?.object;
                return {
                    hasEvent: !!ev,
                    evDesc: ev?.description || "",
                    evSelf: ev?.desirability_for_self || 0,
                    hasOther: ev?.has_other || false,
                    otherTarget: ev?.other_target_id || "",
                    otherD: ev?.desirability_for_other || 0,
                    prospect: ev?.prospect || "",
                    hasAction: !!ac,
                    acDesc: ac?.description || "",
                    agentId: ac?.agent_id || "",
                    pw: ac?.praiseworthiness || 0,
                    hasObject: !!ob,
                    objTarget: ob?.target_id || "",
                    objAp: ob?.appealingness || 0,
                };
            }

            function SituationPanel({
                npcs,
                objects,
                npcId,
                setNpcId,
                partnerId,
                setPartnerId,
                onAppraise,
                onStartChat,
                startChatLabel,
                loading,
                savedSituation,
                sceneInfo,
                toast,
                disabled,
            }) {
                const npcIds = ["player", ...npcs.map((n) => n.id)];
                const [desc, setDesc] = useState("");
                const [significance, setSignificance] = useState(0);

                // Focus별 설정 (Scene 모드)
                const [focusSettings, setFocusSettings] = useState({});
                // 펼침 상태: { focusId: true/false }
                const [expanded, setExpanded] = useState({});

                // 단일 모드 (Scene 없을 때) — 기존 호환
                const [singleFs, setSingleFs] = useState(makeFocusSettings(null));

                // Scene focuses가 바뀌면 focusSettings 초기화
                const sceneKeyRef = React.useRef(null);
                React.useEffect(() => {
                    if (!sceneInfo?.focuses) return;
                    const key = sceneInfo.focuses.map(f => f.id).join(",");
                    if (key === sceneKeyRef.current) return;
                    sceneKeyRef.current = key;
                    const settings = {};
                    const exp = {};
                    sceneInfo.focuses.forEach((f) => {
                        settings[f.id] = makeFocusSettings(f);
                        exp[f.id] = f.is_active; // 활성 Focus만 펼침
                    });
                    setFocusSettings(settings);
                    setExpanded(exp);
                }, [sceneInfo]);

                // --- 시나리오 로드 시 상황설정 복원 ---
                const restoreKeyRef = React.useRef(null);
                const skipSituationSaveRef = React.useRef(false);
                React.useEffect(() => {
                    if (!savedSituation || savedSituation === restoreKeyRef.current) return;
                    restoreKeyRef.current = savedSituation;
                    const s = savedSituation;
                    if (s.desc != null) setDesc(s.desc);
                    if (s.npcId != null) setNpcId(s.npcId);
                    if (s.partnerId != null) setPartnerId(s.partnerId);
                    if (s.significance != null) setSignificance(s.significance);
                    // 단일 모드 복원
                    if (!sceneInfo) {
                        setSingleFs({
                            hasEvent: s.hasEvent ?? true,
                            evDesc: s.evDesc || "",
                            evSelf: s.evSelf || 0,
                            hasOther: s.hasOther || false,
                            otherTarget: s.otherTarget || "",
                            otherD: s.otherD || 0,
                            prospect: s.prospect || "",
                            hasAction: s.hasAction || false,
                            acDesc: s.acDesc || "",
                            agentId: s.agentId || "",
                            pw: s.pw || 0,
                            hasObject: s.hasObject || false,
                            objTarget: s.objTarget || "",
                            objAp: s.objAp || 0,
                        });
                    }
                    // 복원으로 인한 state 변경이 auto-save를 트리거하지 않도록 스킵 플래그 설정
                    skipSituationSaveRef.current = true;
                }, [savedSituation]);

                // --- 상황설정 변경 시 자동 저장 (debounced) ---
                const saveTimerRef = React.useRef(null);
                const allDeps = JSON.stringify({ desc, significance, focusSettings, singleFs, npcId, partnerId });
                React.useEffect(() => {
                    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                    // 로드 직후 첫 자동저장은 건너뜀 (scenario_modified 오염 방지)
                    if (skipSituationSaveRef.current) {
                        skipSituationSaveRef.current = false;
                        return;
                    }
                    saveTimerRef.current = setTimeout(() => {
                        const activeFs = sceneInfo ? focusSettings : { _single: singleFs };
                        const data = { desc, npcId, partnerId, significance, focusSettings: activeFs,
                            // 하위 호환: 단일 모드일 때 기존 필드도 저장
                            ...(!sceneInfo ? singleFs : {}),
                        };
                        fetch("/api/situation", {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(data),
                        }).catch(() => {});
                    }, 500);
                    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
                }, [allDeps]);

                const buildSituationFromFs = (fs) => ({
                    description: desc,
                    event: fs.hasEvent ? {
                        description: fs.evDesc,
                        desirability_for_self: fs.evSelf,
                        other: fs.hasOther ? { target_id: fs.otherTarget, desirability: fs.otherD } : null,
                        prospect: fs.prospect || null,
                    } : null,
                    action: fs.hasAction ? {
                        description: fs.acDesc,
                        agent_id: fs.agentId || null,
                        praiseworthiness: fs.pw,
                    } : null,
                    object: fs.hasObject ? { target_id: fs.objTarget, appealingness: fs.objAp } : null,
                });

                const buildSituation = () => {
                    if (sceneInfo?.focuses) {
                        const active = sceneInfo.focuses.find(f => f.is_active);
                        if (active && focusSettings[active.id]) {
                            return buildSituationFromFs(focusSettings[active.id]);
                        }
                    }
                    return buildSituationFromFs(singleFs);
                };

                const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));
                const updateFocusSetting = (id, newFs) => setFocusSettings(prev => ({ ...prev, [id]: newFs }));

                const focuses = sceneInfo?.focuses || [];

                return (
                    <div className="center" style={disabled ? { opacity: 0.6, pointerEvents: "none" } : {}}>
                        <h2>상황 설정</h2>
                        {disabled && (
                            <div style={{
                                padding: "8px 12px", background: "#fff3cd", color: "#856404",
                                fontSize: 12, borderRadius: 4, marginBottom: 8,
                                textAlign: "center", pointerEvents: "auto",
                            }}>
                                대화 종료됨 — 결과를 저장하거나 시나리오를 다시 로드하세요
                            </div>
                        )}
                        {/* NPC pair */}
                        <div className="pair-select">
                            <div>
                                <label>NPC (주체)</label>
                                <select value={npcId} onChange={(e) => setNpcId(e.target.value)}>
                                    <option value="">선택...</option>
                                    {npcs.map((n) => (
                                        <option key={n.id} value={n.id}>{n.name || n.id}</option>
                                    ))}
                                </select>
                            </div>
                            <div style={{ display: "flex", alignItems: "flex-end", padding: "0 0 2px", color: "var(--fg3)" }}>↔</div>
                            <div>
                                <label>대화 상대</label>
                                <select value={partnerId} onChange={(e) => setPartnerId(e.target.value)}>
                                    <option value="">선택...</option>
                                    {npcIds.map((id) => (
                                        <option key={id} value={id}>{id}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                        <div className="section">
                            <div className="section-header">
                                <span className="title">상황 설명</span>
                            </div>
                            <div className="section-body">
                                <textarea value={desc} onChange={(e) => setDesc(e.target.value)}
                                    rows={2} placeholder="전체 상황 맥락..." />
                                <Slider label="중요도" value={significance} onChange={setSignificance}
                                    min={0} max={1} step={0.1} />
                            </div>
                        </div>

                        {/* Scene 모드: Focus별 접기/펼치기 */}
                        {focuses.length > 0 ? (
                            focuses.map((f, fi) => (
                                <React.Fragment key={f.id}>
                                    <div className="section" style={{ marginBottom: 2 }}>
                                        <div className="section-header"
                                            style={{ cursor: "pointer", userSelect: "none" }}
                                            onClick={() => toggleExpand(f.id)}>
                                            <span style={{ fontSize: 12, marginRight: 6, color: f.is_active ? "var(--accent)" : "var(--fg3)" }}>
                                                {f.is_active ? "●" : "○"}
                                            </span>
                                            <span className="title" style={{ flex: 1 }}>
                                                {f.id}
                                            </span>
                                            <span style={{ fontSize: 10, color: "var(--fg3)" }}>
                                                {expanded[f.id] ? "▼" : "▶"}
                                            </span>
                                        </div>
                                        <div style={{ padding: "0 10px 4px", fontSize: 11, color: "var(--fg2)" }}>
                                            {f.description}
                                        </div>
                                        {expanded[f.id] && focusSettings[f.id] && (
                                            <FocusEditor
                                                fs={focusSettings[f.id]}
                                                onChange={(newFs) => updateFocusSetting(f.id, newFs)}
                                                npcIds={npcIds}
                                                objects={objects}
                                            />
                                        )}
                                    </div>
                                    {/* 전환 조건 (다음 Focus가 있고, 현재가 마지막이 아닐 때) */}
                                    {fi < focuses.length - 1 && focuses[fi + 1].trigger_display && focuses[fi + 1].trigger_display !== "initial" && (
                                        <div style={{
                                            textAlign: "center", fontSize: 10, color: "var(--warn)",
                                            padding: "3px 0", margin: "0 8px",
                                            borderLeft: "1px dashed var(--border)", borderRight: "1px dashed var(--border)",
                                        }}>
                                            전환 조건: {focuses[fi + 1].trigger_display}
                                        </div>
                                    )}
                                </React.Fragment>
                            ))
                        ) : (
                            /* 단일 모드: Scene 없을 때 기존 UI */
                            <FocusEditor
                                fs={singleFs}
                                onChange={setSingleFs}
                                npcIds={npcIds}
                                objects={objects}
                            />
                        )}

                        {/* Action buttons */}
                        {onStartChat && (
                            <button className="btn btn-full"
                                style={{ marginTop: 4, borderColor: "var(--purple)", color: "var(--purple)" }}
                                disabled={loading}
                                onClick={() => onStartChat(buildSituation())}>
                                {startChatLabel || "💬 대화 시작"}
                            </button>
                        )}

                    </div>
                );
            }
            // --- Right: Result Panel ---
            function ResultPanel({
                result,
                history,
                traceHistory,
                testReport,
                onUpdateReport,
                onGuide,
                onStimulus,
                toast,
                sceneInfo,
                chatMessages,
                selectedMsgIdx,
                stimulusUtterance,
                onStimulusUtteranceChange,
                tab,
                onTabChange,
                llmModelInfo,
            }) {
                const setTab = onTabChange;

                // 메시지 선택 시: 탭 전환 없이 데이터만 업데이트
                // (각 탭이 selectedMsgIdx 기준으로 해당 시점 데이터를 표시)

                return (
                    <div className="right">
                        <div className="result-tabs">
                            <div
                                className={`result-tab ${tab === "emotions" ? "active" : ""}`}
                                onClick={() => setTab("emotions")}
                            >
                                감정 상태
                            </div>
                            <div
                                className={`result-tab ${tab === "prompt" ? "active" : ""}`}
                                onClick={() => setTab("prompt")}
                            >
                                컨텍스트
                            </div>
                            <div
                                className={`result-tab ${tab === "stimulus" ? "active" : ""}`}
                                onClick={() => setTab("stimulus")}
                            >
                                자극
                            </div>
                            <div
                                className={`result-tab ${tab === "trace" ? "active" : ""}`}
                                onClick={() => setTab("trace")}
                            >
                                Trace
                            </div>
                            <div
                                className={`result-tab ${tab === "report" ? "active" : ""}`}
                                onClick={() => setTab("report")}
                            >
                                보고서
                            </div>
                            <div
                                className={`result-tab ${tab === "history" ? "active" : ""}`}
                                onClick={() => setTab("history")}
                            >
                                히스토리 ({history.length})
                            </div>
                            <div
                                className={`result-tab ${tab === "model" ? "active" : ""}`}
                                onClick={() => setTab("model")}
                            >
                                LLM Model
                            </div>
                        </div>
                        <div className="result-content">
                            {tab === "emotions" && (
                                <ScenePanel sceneInfo={sceneInfo} />
                            )}
                            {!result && tab !== "history" && tab !== "stimulus" ? (
                                <div className="empty">
                                    {!sceneInfo && (
                                        <div
                                            style={{
                                                fontSize: 24,
                                                marginBottom: 8,
                                            }}
                                        >
                                            🎭
                                        </div>
                                    )}
                                    {!sceneInfo ? (
                                        <>
                                            NPC와 대화 상대를 선택하고
                                            <br />
                                            상황을 설정한 뒤 감정 평가를
                                            실행하세요
                                        </>
                                    ) : (
                                        <div
                                            style={{
                                                fontSize: 11,
                                                color: "var(--fg3)",
                                                marginTop: 8,
                                            }}
                                        >
                                            Scene이 로드됨 — stimulus를
                                            적용하세요
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <>
                                    {tab === "emotions" &&
                                        result &&
                                        <EmotionView result={result} />}
                                    {tab === "prompt" &&
                                        result &&
                                        !result.afterDialogue && (
                                            <ContextView
                                                prompt={result.prompt}
                                                chatMessages={chatMessages}
                                                selectedMsgIdx={selectedMsgIdx}
                                                onRegenerate={onGuide}
                                                onCopy={() =>
                                                    toast &&
                                                    toast(
                                                        "클립보드에 복사됨",
                                                        "success",
                                                    )
                                                }
                                            />
                                        )}
                                    {tab === "stimulus" && (
                                        <StimulusView
                                            utterance={stimulusUtterance}
                                            onUtteranceChange={onStimulusUtteranceChange}
                                            initialPad={(() => {
                                                if (selectedMsgIdx == null || !chatMessages || !chatMessages[selectedMsgIdx]) return null;
                                                const msg = chatMessages[selectedMsgIdx];
                                                // 1. 유저 메시지면 본인의 pad 사용
                                                if (msg.role === "user" && msg.pad) return msg.pad;
                                                // 2. 어시스턴트 메시지면 직전 유저 메시지의 pad 사용
                                                if (msg.role === "assistant") {
                                                    for (let j = selectedMsgIdx - 1; j >= 0; j--) {
                                                        if (chatMessages[j]?.role === "user" && chatMessages[j]?.pad) {
                                                            return chatMessages[j].pad;
                                                        }
                                                    }
                                                }
                                                return null;
                                            })()}
                                            onApply={(pad) => {
                                                onStimulus({
                                                    ...pad,
                                                    situation_description: null,
                                                });
                                                setTab("emotions");
                                            }}
                                            toast={toast}
                                        />
                                    )}
                                    {tab === "trace" &&
                                        result &&
                                        !result.afterDialogue && (
                                            <TraceView
                                                traceHistory={traceHistory}
                                            />
                                        )}
                                    {tab === "report" && (
                                        <ReportView
                                            content={testReport}
                                            onUpdate={onUpdateReport}
                                        />
                                    )}
                                    {tab === "history" && (
                                        <HistoryView history={history} />
                                    )}
                                    {tab === "model" && (
                                        <ModelInfoView info={llmModelInfo} />
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                );
            }
            // --- Center: Chat Panel (대화 모드) ---
            function ChatPanel({
                npcId,
                partnerId,
                npcs,
                messages,
                scenarioTurns,
                scenarioIndex,
                chatLoading,
                selectedMsgIdx,
                onSend,
                onNextTurn,
                onSelectMsg,
                onEndChat,
            }) {
                const [input, setInput] = useState("");
                const messagesEndRef = useRef(null);
                const npc = npcs.find((n) => n.id === npcId);
                const partner = npcs.find((n) => n.id === partnerId);
                const hasScenario =
                    scenarioTurns && scenarioTurns.length > 0;
                const nextTurn =
                    hasScenario && scenarioIndex < scenarioTurns.length
                        ? scenarioTurns[scenarioIndex]
                        : null;

                useEffect(() => {
                    messagesEndRef.current?.scrollIntoView({
                        behavior: "smooth",
                    });
                }, [messages]);

                const handleSend = () => {
                    const text = input.trim();
                    if (!text || chatLoading) return;
                    onSend(text);
                    setInput("");
                };

                const handleKeyDown = (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                    }
                };

                return (
                    <div
                        className="center"
                        style={{
                            display: "flex",
                            flexDirection: "column",
                            overflow: "hidden",
                        }}
                    >
                        {/* Header */}
                        <div className="chat-header">
                            <div>
                                <span className="chat-title">
                                    💬 {npc?.name || npcId} ↔{" "}
                                    {partner?.name || partnerId}
                                </span>
                                {hasScenario && (
                                    <span className="chat-mode">
                                        시나리오
                                    </span>
                                )}
                            </div>
                            <button
                                className="btn small danger"
                                onClick={onEndChat}
                            >
                                대화 종료
                            </button>
                        </div>

                        {/* Messages */}
                        <div className="chat-messages">
                            {messages.map((msg, i) => {
                                if (msg.beat_changed) {
                                    return (
                                        <React.Fragment key={i}>
                                            <div className="chat-beat-divider">
                                                🔄 Beat 전환
                                                {msg.new_focus
                                                    ? `: ${msg.new_focus}`
                                                    : ""}
                                            </div>
                                            <div
                                                className={`chat-msg ${msg.role} ${selectedMsgIdx === i ? "selected" : ""} ${msg.streaming ? "streaming" : ""}`}
                                                onClick={() => onSelectMsg(i)}
                                            >
                                                <div className="msg-role">
                                                    {msg.role === "assistant"
                                                        ? npc?.name || npcId
                                                        : msg.role ===
                                                            "user"
                                                          ? partner?.name ||
                                                            partnerId
                                                          : "System"}
                                                </div>
                                                {msg.content}
                                                {msg.emotions && (
                                                    <div className="msg-emotions">
                                                        📊{" "}
                                                        {Object.entries(
                                                            msg.emotions,
                                                        )
                                                            .map(
                                                                ([k, v]) =>
                                                                    `${k} ${v.toFixed(3)}`,
                                                            )
                                                            .join(" · ")}
                                                    </div>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    );
                                }
                                return (
                                    <div
                                        key={i}
                                        className={`chat-msg ${msg.role} ${selectedMsgIdx === i ? "selected" : ""} ${msg.streaming ? "streaming" : ""}`}
                                        onClick={() => onSelectMsg(i)}
                                    >
                                        <div className="msg-role">
                                            {msg.role === "assistant"
                                                ? npc?.name || npcId
                                                : msg.role === "user"
                                                  ? partner?.name ||
                                                    partnerId
                                                  : "System"}
                                        </div>
                                        {msg.content}
                                        {msg.emotions && (
                                            <div className="msg-emotions">
                                                📊{" "}
                                                {Object.entries(msg.emotions)
                                                    .map(
                                                        ([k, v]) =>
                                                            `${k} ${v.toFixed(3)}`,
                                                    )
                                                    .join(" · ")}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                            {chatLoading && (
                                <div className="chat-loading">
                                    <span>
                                        {npc?.name || npcId} 응답 중
                                    </span>
                                    <span className="dots"></span>
                                </div>
                            )}
                            <div ref={messagesEndRef} />
                        </div>

                        {/* Input area */}
                        {hasScenario ? (
                            <div className="chat-scenario-bar">
                                {nextTurn ? (
                                    <>
                                        <span className="turn-preview">
                                            다음: "{nextTurn.utterance}"
                                        </span>
                                        <span className="turn-count">
                                            {scenarioIndex + 1}/
                                            {scenarioTurns.length}
                                        </span>
                                        <button
                                            className="btn small primary"
                                            onClick={onNextTurn}
                                            disabled={chatLoading}
                                        >
                                            전송 ▶
                                        </button>
                                    </>
                                ) : (
                                    <span
                                        style={{
                                            fontSize: 11,
                                            color: "var(--accent2)",
                                        }}
                                    >
                                        ✓ 시나리오 완료 ({scenarioTurns.length}턴)
                                    </span>
                                )}
                            </div>
                        ) : (
                            <div className="chat-input-area">
                                <textarea
                                    value={input}
                                    onChange={(e) =>
                                        setInput(e.target.value)
                                    }
                                    onKeyDown={handleKeyDown}
                                    placeholder="대사를 입력하세요... (Enter로 전송)"
                                    disabled={chatLoading}
                                />
                                <button
                                    className="btn primary"
                                    onClick={handleSend}
                                    disabled={chatLoading || !input.trim()}
                                    style={{ alignSelf: "flex-end" }}
                                >
                                    전송
                                </button>
                            </div>
                        )}
                    </div>
                );
            }

            // --- ResultViewPanel: 테스트 결과 읽기전용 대화 뷰어 ---
            function ResultViewPanel({
                npcId,
                partnerId,
                npcs,
                messages,
                selectedMsgIdx,
                onSelectMsg,
                onClose,
            }) {
                const npc = npcs.find((n) => n.id === npcId);
                const partner = npcs.find((n) => n.id === partnerId);

                return (
                    <div
                        className="center"
                        style={{
                            display: "flex",
                            flexDirection: "column",
                            overflow: "hidden",
                        }}
                    >
                        {/* Header */}
                        <div className="chat-header">
                            <div>
                                <span className="chat-title">
                                    📋 {npc?.name || npcId} ↔{" "}
                                    {partner?.name || partnerId}
                                </span>
                                <span className="chat-mode">결과 보기</span>
                            </div>
                            <button
                                className="btn small"
                                onClick={onClose}
                            >
                                닫기
                            </button>
                        </div>

                        {/* Messages (read-only) */}
                        <div className="chat-messages">
                            {messages.map((msg, i) => {
                                if (msg.beat_changed) {
                                    return (
                                        <React.Fragment key={i}>
                                            <div className="chat-beat-divider">
                                                🔄 Beat 전환
                                                {msg.new_focus
                                                    ? `: ${msg.new_focus}`
                                                    : ""}
                                            </div>
                                            <div
                                                className={`chat-msg ${msg.role} ${selectedMsgIdx === i ? "selected" : ""}`}
                                                onClick={() => onSelectMsg(i)}
                                            >
                                                <div className="msg-role">
                                                    {msg.role === "assistant"
                                                        ? npc?.name || npcId
                                                        : msg.role === "user"
                                                          ? partner?.name || partnerId
                                                          : "System"}
                                                </div>
                                                {msg.content}
                                                {msg.emotions && (
                                                    <div className="msg-emotions">
                                                        📊{" "}
                                                        {Object.entries(msg.emotions)
                                                            .map(([k, v]) => `${k} ${v.toFixed(3)}`)
                                                            .join(" · ")}
                                                    </div>
                                                )}
                                            </div>
                                        </React.Fragment>
                                    );
                                }
                                return (
                                    <div
                                        key={i}
                                        className={`chat-msg ${msg.role} ${selectedMsgIdx === i ? "selected" : ""}`}
                                        onClick={() => onSelectMsg(i)}
                                    >
                                        <div className="msg-role">
                                            {msg.role === "assistant"
                                                ? npc?.name || npcId
                                                : msg.role === "user"
                                                  ? partner?.name || partnerId
                                                  : "System"}
                                        </div>
                                        {msg.content}
                                        {msg.emotions && (
                                            <div className="msg-emotions">
                                                📊{" "}
                                                {Object.entries(msg.emotions)
                                                    .map(([k, v]) => `${k} ${v.toFixed(3)}`)
                                                    .join(" · ")}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            function ScenePanel({ sceneInfo }) {
                if (!sceneInfo) return null;
                return (
                    <div className="section" style={{ marginBottom: 8 }}>
                        <div className="section-header">
                            <span
                                className="title"
                                style={{ color: "var(--accent2)" }}
                            >
                                Scene Focus
                            </span>
                        </div>
                        <div
                            className="section-body"
                            style={{ padding: "6px 10px" }}
                        >
                            {sceneInfo.focuses.map((f, i) => (
                                <div
                                    key={i}
                                    style={{
                                        display: "flex",
                                        alignItems: "center",
                                        gap: 6,
                                        marginBottom: 4,
                                        fontSize: 11,
                                    }}
                                >
                                    <span
                                        style={{
                                            color: f.is_active
                                                ? "var(--green)"
                                                : "var(--fg3)",
                                            fontWeight: f.is_active ? 700 : 400,
                                        }}
                                    >
                                        {f.is_active ? "●" : "○"}
                                    </span>
                                    <span
                                        style={{
                                            color: f.is_active
                                                ? "var(--fg)"
                                                : "var(--fg3)",
                                            fontWeight: f.is_active ? 600 : 400,
                                        }}
                                    >
                                        {f.id}
                                    </span>
                                    <span
                                        style={{ color: "var(--fg3)", flex: 1 }}
                                    >
                                        — {f.description}
                                    </span>
                                    <span
                                        style={{
                                            color: "var(--fg3)",

            function StimulusView({ utterance, onUtteranceChange, initialPad, onApply, toast }) {
                const [padP, setPadP] = useState(0);
                const [padA, setPadA] = useState(0);
                const [padD, setPadD] = useState(0);
                const [analyzing, setAnalyzing] = useState(false);
                const [analyzed, setAnalyzed] = useState(false);

                // initialPad가 바뀌면 슬라이더에 반영 (메시지 선택 시)
                const prevPadRef = React.useRef(null);
                React.useEffect(() => {
                    if (initialPad) {
                        setPadP(Math.round(initialPad.pleasure * 100) / 100);
                        setPadA(Math.round(initialPad.arousal * 100) / 100);
                        setPadD(Math.round(initialPad.dominance * 100) / 100);
                    } else {
                        // 기록된 자극 정보가 없으면 0으로 초기화
                        setPadP(0);
                        setPadA(0);
                        setPadD(0);
                    }
                    prevPadRef.current = initialPad;
                }, [initialPad]);

                const doAnalyze = async () => {
                    if (!utterance || !utterance.trim()) return;
                    setAnalyzing(true);
                    try {
                        const res = await fetch("/api/analyze-utterance", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ utterance: utterance.trim() }),
                        });
                        if (res.status === 501) {
                            toast("임베딩 미지원 — PAD를 수동 입력하세요", "warn");
                            return;
                        }
                        if (!res.ok) {
                            toast("분석 실패: " + (await res.text()), "error");
                            return;
                        }
                        const pad = await res.json();
                        const p = Math.round(pad.pleasure * 100) / 100;
                        const a = Math.round(pad.arousal * 100) / 100;
                        const d = Math.round(pad.dominance * 100) / 100;
                        setPadP(p);
                        setPadA(a);
                        setPadD(d);
                        setAnalyzed(true);
                    } catch (e) {
                        toast("분석 오류", "error");
                    } finally {
                        setAnalyzing(false);
                    }
                };

                return (
                    <div>
                        {/* 자극 적용 (상단) */}
                        <div className="section">
                            <div className="section-header">
                                <span className="title" style={{ color: "var(--warn)" }}>
                                    자극 적용
                                </span>
                                {initialPad && (
                                    <span style={{ fontSize: 10, color: "var(--fg3)", marginLeft: 8 }}>
                                        대사 PAD 반영됨
                                    </span>
                                )}
                            </div>
                            <div className="section-body">
                                <Slider label="P (쾌)" value={padP} onChange={setPadP} />
                                <Slider label="A (각성)" value={padA} onChange={setPadA} />
                                <Slider label="D (지배)" value={padD} onChange={setPadD} />
                                <button
                                    className="btn primary btn-full"
                                    style={{ marginTop: 6 }}
                                    onClick={() => onApply({ pleasure: padP, arousal: padA, dominance: padD })}
                                >
                                    자극 적용
                                </button>
                            </div>
                        </div>

                        {/* 대사 분석 (하단) */}
                        <div className="section" style={{ marginTop: 8 }}>
                            <div className="section-header">
                                <span className="title" style={{ color: "var(--accent)" }}>
                                    대사 분석
                                </span>
                            </div>
                            <div className="section-body">
                                <label style={{ fontSize: 11, color: "var(--fg2)" }}>
                                    상대 대사
                                </label>
                                <div style={{ display: "flex", gap: 4, marginBottom: 6 }}>
                                    <input
                                        type="text"
                                        value={utterance}
                                        onChange={(e) => {
                                            onUtteranceChange(e.target.value);
                                            setAnalyzed(false);
                                        }}
                                        placeholder="대사를 입력하거나 채팅에서 선택..."
                                        style={{
                                            flex: 1,
                                            background: "var(--bg3)",
                                            color: "var(--fg)",
                                            border: "1px solid var(--border)",
                                            borderRadius: "var(--radius)",
                                            padding: "4px 8px",
                                            fontSize: 12,
                                        }}
                                    />
                                    <button
                                        className="btn small"
                                        disabled={!utterance || !utterance.trim() || analyzing}
                                        onClick={doAnalyze}
                                    >
                                        {analyzing ? "분석중..." : "분석"}
                                    </button>
                                </div>
                                {analyzed && (
                                    <div style={{
                                        background: "var(--bg3)",
                                        borderRadius: "var(--radius)",
                                        padding: "8px 10px",
                                        fontSize: 12,
                                        fontFamily: "monospace",
                                    }}>
                                        <div style={{ color: "var(--fg2)", fontSize: 10, marginBottom: 4 }}>
                                            분석 결과
                                        </div>
                                        <span style={{ color: "var(--accent2)" }}>P</span> {padP >= 0 ? "+" : ""}{padP.toFixed(2)}
                                        {"  "}
                                        <span style={{ color: "var(--warn)" }}>A</span> {padA >= 0 ? "+" : ""}{padA.toFixed(2)}
                                        {"  "}
                                        <span style={{ color: "var(--purple)" }}>D</span> {padD >= 0 ? "+" : ""}{padD.toFixed(2)}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            function HistoryView({ history }) {
