# 부호 축 분류기 벤치마크 테스트 케이스
#
# sign_keep.toml / sign_invert.toml 프로토타입과 중복 금지 (데이터 누수 방지).
# expected_* 라벨 임의 변경 금지. 변경 시 Bekay 확인 필수.
#
# 배분:
#   easy 10 (keep 5 + invert 5)
#   medium 10 (keep 5 + invert 5)
#   hard 6 (keep 3 + invert 3)
#
# 상세: docs/emotion/sign-classifier-design.md §4.4

[meta]
language = "ko"
register = "wuxia"
version = "1"
last_updated = "2026-04-18"

# ====================
# EASY (10) — 프로토타입 near-duplicate, 명확한 의도
# ====================

[[case]]
id = "001"
utterance = "크나큰 은혜를 입었소."
