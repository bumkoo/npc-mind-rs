# Listener-Perspective 정규식 프리필터 패턴
#
# 임베딩(BGE-M3)이 표면 어휘 편향으로 오분류하는 케이스를 규칙 기반으로 덮는다.
# k-NN SignClassifier 앞단에 위치하여 매칭 시 (sign, magnitude, P_S_default) 직접 반환.
# 매칭 실패 시 기존 임베딩 경로로 자연 fallback.
#
# 설계 원칙:
# 1. 어미 결합형(Suffix-bound) — "아니"만 쓰지 말고 "아니었(으면|더라면)"처럼 결합
# 2. 부정사 lookahead 제외는 현 단계 미도입 (overmatch 관측 후 추가)
# 3. 카테고리당 최소 2~3 패턴, 전체 10 패턴 이내 유지 (유지보수성)
# 4. 우선순위: 더 구체적인 패턴이 앞쪽에 위치 (선매칭 우선)
#
# 상세: docs/emotion/sign-classifier-design.md §3.5 (Phase 3)

[meta]
language = "ko"
register = "wuxia"
version = "1"
last_updated = "2026-04-19"

# ============================================================
# 카테고리 1: counterfactual_gratitude — 반사실적 감사
# ============================================================
# 표면 어휘: 죽음/부재 (아니었으면, 없었더라면, 죽을 뻔)
# 의도: 구원받은 감사
# 타겟: 011 "그대 아니었으면 이 몸은 이미 이 세상 사람이 아니었으리"

[[category]]
name = "counterfactual_gratitude"
sign = "keep"
magnitude = "strong"
p_s_default = 0.7
description = "반사실적 조건절로 표현된 감사"

patterns = [
    # "~아니었으면", "~아니었더라면" (어미 결합형)
    '아니었(으면|더라면)',
    # "~없었으면", "~없었더라면"
    '없었(으면|더라면)',
    # "~할 뻔", "~될 뻔", "~죽을 뻔" (반사실 완료)
    '(할|될|죽을|잃을)\s*뻔',
    # "이 세상 사람이 아니" (완곡한 죽음 반사실)
    '이\s*세상\s*사람이\s*아니',
]

# ============================================================
# 카테고리 2: negation_praise — 부정 형태의 극찬
# ============================================================
# 표면 어휘: 부정 수식 (다시없을, 둘도 없는, 비할 데 없)
# 의도: 유일무이한 재능 칭찬
# 타겟: 012 "천하에 다시없을 검객이시오"

[[category]]
name = "negation_praise"
sign = "keep"
magnitude = "strong"
p_s_default = 0.7
description = "부정 수식어를 통한 유일성 극찬"

patterns = [
    # "다시없을", "다시없는"
    '다시없(을|는|이)',
    # "둘도 없는/없을"
    '둘도\s*없',
    # "전무후무", "전대미문"
    '전무후무|전대미문',
    # "비할 데 없", "견줄 자 없"
    '(비할\s*데|견줄\s*자)\s*없',
]

# ============================================================
# 카테고리 3: wuxia_criticism — 무협 도메인 비난/위협
# ============================================================
# 도메인 특화 어휘 (수치, 망나니, 피를 맛보, 도를 더럽)
# 타겟: 013 "무림의 수치로다", 014 "이 검이 그대 피를 맛보게"

[[category]]
name = "wuxia_criticism"
sign = "keep"
magnitude = "strong"
p_s_default = -0.7
description = "무협 관용구 기반 비난·위협"

patterns = [
    # 비난 어미: "~수치(로다|스럽)"
    '수치(로다|스럽)',
    # 비난 명사
    '망나니|잔당|역도|무뢰배',
    # 위협 관용구
    '피를\s*맛보',
    '목이\s*(달아|떨어)',
    # 도/도리 저버림
    '(도|도리)를\s*(더럽|저버)',
    # 추상 비난
    '부끄러움도\s*모르',
]

# ============================================================
# 카테고리 4: sarcasm_interjection — 감탄사 기반 빈정
# ============================================================
# 감탄사("허허", "아이고") + 과장 존칭/수사 조합
# 타겟: 020 "허허, 참으로 갸륵한", 021 "그렇게 잘났으면 혼자 하시구려"

[[category]]
name = "sarcasm_interjection"
sign = "invert"
magnitude = "strong"
p_s_default = 0.6
description = "감탄사·과장 존칭을 통한 빈정·조롱"

patterns = [
    # 문두 감탄사 + 반어 수사
    '^(허허|아이고|아이구|저런)[,\s].*(갸륵|훌륭|대단|참으로)',
    # "그렇게 ~으면 ~시구려" (조롱형 권유)
    '그렇게\s+\S+(으면|면)\s+.*(시구려|시오)',
    # "참으로 ~하기도 (하셔|하시)" (과장 존칭)
    '참으로\s+\S+하기도\s+(하셔|하시)',
    # "~하기도 하셔라" (감탄 반어)
    '하기도\s*하셔라',
]
