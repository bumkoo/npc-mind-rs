    { text = "부족한 제 탓이오, 깊이 뉘우치고 있소이다.", subtype = "apology", source = "created_by_bekay" },
    { text = "무례를 저질렀으니 책임을 지리다.", subtype = "apology", source = "created_by_bekay" },

    # --- 간청 (plea, 표준) ---
    { text = "한 가지 청이 있어 이리 찾아왔소.", subtype = "plea", source = "created_by_bekay" },
    { text = "부디 제 부탁 하나만 들어주시오.", subtype = "plea", source = "created_by_bekay" },

    # --- 위로 (condolence, 표준) ---
    { text = "그대의 심정, 어찌 헤아릴 수 있으리.", subtype = "condolence", source = "created_by_bekay" },
