[package]
name = "npc-mind"
version = "0.1.0"
edition = "2021"
description = "NPC Psychological Engine: HEXACO personality → OCC emotion → LLM guide"

[features]
default = []
embed = ["dep:bge-m3-onnx-rust"]
devgui = ["dep:eframe", "dep:tracing-subscriber"]
webui = ["dep:axum", "dep:tokio", "dep:tower-http", "dep:tracing-subscriber"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
toml = "0.8"
tracing = "0.1"
bge-m3-onnx-rust = { path = "../bge-m3-onnx-rust", optional = true }
eframe = { version = "0.31", optional = true }
tracing-subscriber = { version = "0.3", optional = true }
axum = { version = "0.8", optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"], optional = true }
tower-http = { version = "0.6", features = ["cors", "fs"], optional = true }

[dev-dependencies]
approx = "0.5"

[[bin]]
name = "npc-devgui"
path = "src/bin/devgui/main.rs"
required-features = ["devgui"]

[[bin]]
name = "npc-webui"
path = "src/bin/webui/main.rs"
required-features = ["webui"]
