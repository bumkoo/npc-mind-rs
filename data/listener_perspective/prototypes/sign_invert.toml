# 부호 반전 프로토타입 (sign_invert)
#
# 청자가 체감하는 P 부호가 화자와 반대인 발화.
# 사과/간청/위로 (P- → 약한 P+), 빈정 (P+ → 강한 P-)
#
# 분류기는 이 프로토타입들과 cosine 유사도로 "invert" 판정을 내린다.
#
# 큐레이션 원칙:
#   1. 명확한 사례만 (경계/혼합 발화는 테스트 케이스로)
#   2. 그룹 내 다양성 (subtype 균형)
#   3. 톤 통일 (1인칭 대사, 무협체)
#   4. 수집 가능성 보장 (source 필드)
#   5. 형식 대칭 배치 (빈정 변종 3종: 평범/반복강조/과장존칭)
#
# 상세: docs/emotion/sign-classifier-design.md §3.3

[meta]
language = "ko"
register = "wuxia"
version = "2"
group = "sign_invert"
last_updated = "2026-04-18"

[prototypes]
items = [
