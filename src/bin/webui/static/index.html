<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPC Mind Engine</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460; --bg4: #1e2a4a;
  --fg: #e0e0e0; --fg2: #aaa; --fg3: #777;
  --accent: #4fc3f7; --accent2: #81c784; --warn: #ffb74d; --err: #ef5350;
  --border: #333; --radius: 6px;
}
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--fg); font-size: 13px; }
/* Layout */
.header { padding:10px 20px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.header h1 { font-size:16px; font-weight:500; }
.header .status { font-size:12px; color:var(--fg2); }
.header .status.ok { color:var(--accent2); }
.main { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); min-height:calc(100vh - 42px); }
.panel { background:var(--bg); padding:12px; overflow-y:auto; max-height:calc(100vh - 42px); }
.panel h2 { font-size:14px; font-weight:500; color:var(--accent); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
.panel h3 { font-size:13px; font-weight:500; color:var(--fg2); margin:10px 0 6px; }

/* Form elements */
label { display:block; font-size:12px; color:var(--fg2); margin:4px 0 2px; }
input[type=text], input[type=number], textarea, select {
  width:100%; padding:4px 8px; background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--fg); font-size:12px; outline:none;
}
input[type=text]:focus, textarea:focus, select:focus { border-color:var(--accent); }
textarea { resize:vertical; min-height:40px; font-family:inherit; }
input[type=range] { width:100%; accent-color:var(--accent); }
</style>
<style>
/* Slider row */
.slider-row { display:flex; align-items:center; gap:6px; margin:2px 0; }
.slider-row label { width:60px; flex-shrink:0; text-align:right; margin:0; font-size:11px; }
.slider-row input[type=range] { flex:1; }
.slider-row .val { width:36px; text-align:right; font-family:monospace; font-size:11px; color:var(--accent); }

/* Buttons */
.btn { padding:4px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:12px; }
.btn:hover { background:var(--bg3); }
.btn.primary { background:var(--bg3); border-color:var(--accent); color:var(--accent); }
.btn.danger { border-color:var(--err); color:var(--err); }
.btn.small { padding:2px 8px; font-size:11px; }
.btn-row { display:flex; gap:6px; margin:6px 0; flex-wrap:wrap; }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:8px; margin:6px 0; }
.card .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.card .card-title { font-weight:500; color:var(--fg); font-size:12px; }

/* Results */
.result-box { background:var(--bg4); border:1px solid var(--border); border-radius:var(--radius); padding:10px; margin:6px 0; font-family:monospace; font-size:11px; white-space:pre-wrap; max-height:300px; overflow-y:auto; line-height:1.5; }
.prompt-box { background:#1a2a1a; border-color:#2a4a2a; }
.trace-box { background:#2a1a1a; border-color:#4a2a2a; color:#ccc; }

/* Tabs */
.tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:8px; }
.tab { padding:6px 14px; cursor:pointer; border-bottom:2px solid transparent; color:var(--fg2); font-size:12px; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover { color:var(--fg); }

/* Bottom area */
.bottom { grid-column:1/-1; display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--border); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// --- API 헬퍼 ---
const api = {
  get: (url) => fetch(url).then(r => r.json()),
  post: (url, data) => fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }),
  del: (url) => fetch(url, { method:'DELETE' }),
  postJson: (url, data) => fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) }).then(r => r.json()),
};

// --- 슬라이더 행 ---
function Slider({label, value, onChange, min=-1, max=1, step=0.05}) {
  return (
    <div className="slider-row">
      <label>{label}</label>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} />
      <span className="val">{value.toFixed(2)}</span>
    </div>
  );
}
// --- NPC 패널 ---
function NpcPanel({npcs, selectedNpc, onSelect, onRefresh}) {
  const emptyNpc = {id:'',name:'',description:'',sincerity:0,fairness:0,greed_avoidance:0,modesty:0,fearfulness:0,anxiety:0,dependence:0,sentimentality:0,social_self_esteem:0,social_boldness:0,sociability:0,liveliness:0,forgiveness:0,gentleness:0,flexibility:0,patience:0,organization:0,diligence:0,perfectionism:0,prudence:0,aesthetic_appreciation:0,inquisitiveness:0,creativity:0,unconventionality:0};
  const [npc, setNpc] = useState(emptyNpc);
  const [expanded, setExpanded] = useState(null); // 열린 차원

  useEffect(() => { if(selectedNpc) setNpc({...selectedNpc}); }, [selectedNpc]);

  const set = (k,v) => setNpc(p => ({...p, [k]:v}));
  const save = async () => {
    if(!npc.id) return alert('ID 필수');
    await api.post('/api/npcs', npc);
    onRefresh();
  };
  const del = async () => {
    if(!npc.id) return;
    await api.del(`/api/npcs/${npc.id}`);
    setNpc(emptyNpc);
    onRefresh();
  };

  const dims = [
    {key:'H', name:'정직-겸손성', facets:[['sincerity','진실성'],['fairness','공정성'],['greed_avoidance','탐욕회피'],['modesty','겸손']]},
    {key:'E', name:'정서성', facets:[['fearfulness','공포성'],['anxiety','불안'],['dependence','의존성'],['sentimentality','감상성']]},
    {key:'X', name:'외향성', facets:[['social_self_esteem','자존감'],['social_boldness','대담성'],['sociability','사교성'],['liveliness','활발성']]},
    {key:'A', name:'원만성', facets:[['forgiveness','용서'],['gentleness','온화함'],['flexibility','유연성'],['patience','인내심']]},
    {key:'C', name:'성실성', facets:[['organization','조직성'],['diligence','근면성'],['perfectionism','완벽주의'],['prudence','신중함']]},
    {key:'O', name:'경험개방성', facets:[['aesthetic_appreciation','미적감상'],['inquisitiveness','탐구심'],['creativity','창의성'],['unconventionality','비관습성']]},
  ];
  return (
    <div className="panel">
      <h2>NPC 프로필</h2>
      <div className="btn-row">
        {npcs.map(n => (
          <button key={n.id} className={`btn small ${selectedNpc?.id===n.id?'primary':''}`} onClick={()=>onSelect(n)}>{n.name||n.id}</button>
        ))}
        <button className="btn small" onClick={()=>{setNpc(emptyNpc);onSelect(null)}}>+ 새 NPC</button>
      </div>
      <div className="card">
        <label>ID</label><input type="text" value={npc.id} onChange={e=>set('id',e.target.value)} />
        <label>이름</label><input type="text" value={npc.name} onChange={e=>set('name',e.target.value)} />
        <label>설명</label><textarea value={npc.description} onChange={e=>set('description',e.target.value)} rows={2} />
      </div>
      {dims.map(dim => (
        <div key={dim.key} className="card">
          <div className="card-header" style={{cursor:'pointer'}} onClick={()=>setExpanded(expanded===dim.key?null:dim.key)}>
            <span className="card-title">{dim.key}: {dim.name} {(() => { const avg = dim.facets.reduce((s,f)=>s+npc[f[0]],0)/4; return <span style={{color:'var(--accent)',marginLeft:8}}>{avg.toFixed(2)}</span>; })()}</span>
            <span style={{color:'var(--fg3)'}}>{expanded===dim.key?'▼':'▶'}</span>
          </div>
          {expanded===dim.key && dim.facets.map(([k,label]) => (
            <Slider key={k} label={label} value={npc[k]} onChange={v=>set(k,v)} />
          ))}
        </div>
      ))}
      <div className="btn-row">
        <button className="btn primary" onClick={save}>저장</button>
        {npc.id && <button className="btn danger" onClick={del}>삭제</button>}
      </div>
    </div>
  );
}
// --- 관계 패널 ---
function RelPanel({rels, npcs, onRefresh}) {
  const [rel, setRel] = useState({owner_id:'',target_id:'',closeness:0,trust:0,power:0});
  const [selected, setSelected] = useState(null);
  const set = (k,v) => setRel(p=>({...p,[k]:v}));

  const save = async () => {
    if(!rel.owner_id||!rel.target_id) return alert('양쪽 ID 필수');
    await api.post('/api/relationships', rel);
    onRefresh();
  };
  const del = async () => {
    if(!rel.owner_id||!rel.target_id) return;
    await api.del(`/api/relationships/${rel.owner_id}/${rel.target_id}`);
    setRel({owner_id:'',target_id:'',closeness:0,trust:0,power:0});
    setSelected(null);
    onRefresh();
  };

  const npcIds = ['player', ...npcs.map(n=>n.id)];

  return (
    <div className="panel">
      <h2>관계 관리</h2>
      <div className="btn-row" style={{flexWrap:'wrap'}}>
        {rels.map(r => (
          <button key={r.owner_id+':'+r.target_id} className={`btn small ${selected===r.owner_id+':'+r.target_id?'primary':''}`}
            onClick={()=>{setRel({...r});setSelected(r.owner_id+':'+r.target_id)}}>
            {r.owner_id}↔{r.target_id}
          </button>
        ))}
        <button className="btn small" onClick={()=>{setRel({owner_id:'',target_id:'',closeness:0,trust:0,power:0});setSelected(null)}}>+ 새 관계</button>
      </div>
      <div className="card">
        <label>소유자</label>
        <select value={rel.owner_id} onChange={e=>set('owner_id',e.target.value)}>
          <option value="">선택...</option>
          {npcIds.map(id=><option key={id} value={id}>{id}</option>)}
        </select>
        <label>대상</label>
        <select value={rel.target_id} onChange={e=>set('target_id',e.target.value)}>
          <option value="">선택...</option>
          {npcIds.map(id=><option key={id} value={id}>{id}</option>)}
        </select>
        <Slider label="친밀도" value={rel.closeness} onChange={v=>set('closeness',v)} />
        <Slider label="신뢰도" value={rel.trust} onChange={v=>set('trust',v)} />
        <Slider label="상하" value={rel.power} onChange={v=>set('power',v)} />
      </div>
      <div className="btn-row">
        <button className="btn primary" onClick={save}>저장</button>
        {selected && <button className="btn danger" onClick={del}>삭제</button>}
      </div>
    </div>
  );
}
// --- 오브젝트 패널 ---
function ObjPanel({objects, onRefresh}) {
  const [obj, setObj] = useState({id:'',description:'',category:null});
  const [selected, setSelected] = useState(null);
  const set = (k,v) => setObj(p=>({...p,[k]:v}));

  const save = async () => {
    if(!obj.id) return alert('ID 필수');
    await api.post('/api/objects', obj);
    onRefresh();
  };
  const del = async () => {
    if(!obj.id) return;
    await api.del(`/api/objects/${obj.id}`);
    setObj({id:'',description:'',category:null});
    setSelected(null);
    onRefresh();
  };

  return (
    <div className="panel">
      <h2>오브젝트 등록</h2>
      <div className="btn-row" style={{flexWrap:'wrap'}}>
        {objects.map(o => (
          <button key={o.id} className={`btn small ${selected===o.id?'primary':''}`}
            onClick={()=>{setObj({...o});setSelected(o.id)}}>{o.id}</button>
        ))}
        <button className="btn small" onClick={()=>{setObj({id:'',description:'',category:null});setSelected(null)}}>+ 새 오브젝트</button>
      </div>
      <div className="card">
        <label>ID</label><input type="text" value={obj.id} onChange={e=>set('id',e.target.value)} />
        <label>설명</label><textarea value={obj.description} onChange={e=>set('description',e.target.value)} rows={2} />
        <label>카테고리</label><input type="text" value={obj.category||''} onChange={e=>set('category',e.target.value||null)} placeholder="사물/장소/NPC특성..." />
      </div>
      <div className="btn-row">
        <button className="btn primary" onClick={save}>저장</button>
        {selected && <button className="btn danger" onClick={del}>삭제</button>}
      </div>
    </div>
  );
}
// --- 상황 설정 + 결과 패널 ---
function SituationPanel({npcs, objects, result, setResult}) {
  const npcIds = ['player', ...npcs.map(n=>n.id)];
  const [npcId, setNpcId] = useState('');
  const [partnerId, setPartnerId] = useState('');
  const [desc, setDesc] = useState('');

  // Event
  const [hasEvent, setHasEvent] = useState(true);
  const [evDesc, setEvDesc] = useState('');
  const [evSelf, setEvSelf] = useState(0);
  const [hasOther, setHasOther] = useState(false);
  const [otherTarget, setOtherTarget] = useState('');
  const [otherD, setOtherD] = useState(0);
  const [prospect, setProspect] = useState('');

  // Action
  const [hasAction, setHasAction] = useState(false);
  const [acDesc, setAcDesc] = useState('');
  const [agentId, setAgentId] = useState(''); // ''=자기
  const [pw, setPw] = useState(0);

  // Object
  const [hasObject, setHasObject] = useState(false);
  const [objTarget, setObjTarget] = useState('');
  const [objAp, setObjAp] = useState(0);

  const [tab, setTab] = useState('prompt');

  const runAppraise = async () => {
    if(!npcId||!partnerId) return alert('NPC와 대화 상대를 선택하세요');
    const body = {
      npc_id: npcId,
      partner_id: partnerId,
      situation: {
        description: desc,
        event: hasEvent ? {
          description: evDesc,
          desirability_for_self: evSelf,
          other: hasOther ? { target_id: otherTarget, desirability: otherD } : null,
          prospect: prospect || null,
        } : null,
        action: hasAction ? {
          description: acDesc,
          agent_id: agentId || null,
          praiseworthiness: pw,
        } : null,
        object: hasObject ? {
          target_id: objTarget,
          appealingness: objAp,
        } : null,
      }
    };
    try {
      const res = await fetch('/api/appraise', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok) { const t=await res.text(); alert('오류: '+t); return; }
      setResult(await res.json());
    } catch(e) { alert('요청 실패: '+e); }
  };
  return (
    <div style={{gridColumn:'1/-1', display:'grid', gridTemplateColumns:'1fr 2fr', gap:'1px', background:'var(--border)'}}>
      {/* 왼쪽: 상황 입력 */}
      <div className="panel">
        <h2>상황 설정</h2>
        <div className="card">
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}>
              <label>NPC (주체)</label>
              <select value={npcId} onChange={e=>setNpcId(e.target.value)}>
                <option value="">선택...</option>
                {npcs.map(n=><option key={n.id} value={n.id}>{n.name||n.id}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <label>대화 상대</label>
              <select value={partnerId} onChange={e=>setPartnerId(e.target.value)}>
                <option value="">선택...</option>
                {npcIds.map(id=><option key={id} value={id}>{id}</option>)}
              </select>
            </div>
          </div>
          <label>상황 설명</label>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2} placeholder="전체 상황 맥락..." />
        </div>
        {/* Event Focus */}
        <div className="card">
          <div className="card-header">
            <label style={{display:'inline',margin:0}}><input type="checkbox" checked={hasEvent} onChange={e=>setHasEvent(e.target.checked)} /> Event (사건)</label>
          </div>
          {hasEvent && <>
            <label>사건 설명</label>
            <input type="text" value={evDesc} onChange={e=>setEvDesc(e.target.value)} placeholder="의형제가 구출됨..." />
            <Slider label="자기 영향" value={evSelf} onChange={setEvSelf} />
            <label style={{display:'inline',margin:'4px 0'}}><input type="checkbox" checked={hasOther} onChange={e=>setHasOther(e.target.checked)} /> 타인 영향</label>
            {hasOther && <>
              <label>대상</label>
              <select value={otherTarget} onChange={e=>setOtherTarget(e.target.value)}>
                <option value="">선택...</option>
                {npcIds.map(id=><option key={id} value={id}>{id}</option>)}
              </select>
              <Slider label="타인 영향" value={otherD} onChange={setOtherD} />
            </>}
            <label>전망</label>
            <select value={prospect} onChange={e=>setProspect(e.target.value)}>
              <option value="">없음</option>
              <option value="anticipation">Anticipation (전망)</option>
              <option value="hope_fulfilled">HopeFulfilled (희망 실현)</option>
              <option value="hope_unfulfilled">HopeUnfulfilled (희망 좌절)</option>
              <option value="fear_unrealized">FearUnrealized (공포 해소)</option>
              <option value="fear_confirmed">FearConfirmed (공포 확인)</option>
            </select>
          </>}
        </div>

        {/* Action Focus */}
        <div className="card">
          <div className="card-header">
            <label style={{display:'inline',margin:0}}><input type="checkbox" checked={hasAction} onChange={e=>setHasAction(e.target.checked)} /> Action (행동)</label>
          </div>
          {hasAction && <>
            <label>행동 설명</label>
            <input type="text" value={acDesc} onChange={e=>setAcDesc(e.target.value)} placeholder="비밀 누설..." />
            <label>행위자</label>
            <select value={agentId} onChange={e=>setAgentId(e.target.value)}>
              <option value="">자기 (NPC 본인)</option>
              {npcIds.map(id=><option key={id} value={id}>{id}</option>)}
            </select>
            <Slider label="도덕성" value={pw} onChange={setPw} />
          </>}
        </div>

        {/* Object Focus */}
        <div className="card">
          <div className="card-header">
            <label style={{display:'inline',margin:0}}><input type="checkbox" checked={hasObject} onChange={e=>setHasObject(e.target.checked)} /> Object (대상)</label>
          </div>
          {hasObject && <>
            <label>대상</label>
            <select value={objTarget} onChange={e=>setObjTarget(e.target.value)}>
              <option value="">선택...</option>
              {objects.map(o=><option key={o.id} value={o.id}>{o.id} — {o.description}</option>)}
              {npcIds.map(id=><option key={'npc_'+id} value={id}>{id} (NPC)</option>)}
            </select>
            <Slider label="매력도" value={objAp} onChange={setObjAp} />
          </>}
        </div>

        <div className="btn-row">
          <button className="btn primary" onClick={runAppraise} style={{flex:1}}>감정 평가 실행</button>
        </div>
      </div>

      {/* 오른쪽: 결과 표시 */}
      <div className="panel">
        <h2>결과</h2>
        {!result ? (
          <div style={{color:'var(--fg3)',padding:20,textAlign:'center'}}>감정 평가를 실행하세요</div>
        ) : (<>
          <div className="tabs">
            <div className={`tab ${tab==='emotions'?'active':''}`} onClick={()=>setTab('emotions')}>감정 상태</div>
            <div className={`tab ${tab==='prompt'?'active':''}`} onClick={()=>setTab('prompt')}>프롬프트</div>
            <div className={`tab ${tab==='trace'?'active':''}`} onClick={()=>setTab('trace')}>Trace</div>
          </div>

          {tab==='emotions' && (
            <div>
              {result.dominant && (
                <div className="card" style={{borderColor:'var(--accent)'}}>
                  <div style={{fontSize:12,color:'var(--fg2)'}}>지배 감정</div>
                  <div style={{fontSize:15,fontWeight:500,color:'var(--accent)'}}>
                    {result.dominant.emotion_type} ({result.dominant.intensity.toFixed(3)})
                  </div>
                  {result.dominant.context && <div style={{fontSize:11,color:'var(--fg2)',marginTop:2}}>— {result.dominant.context}</div>}
                </div>
              )}
              <h3>활성 감정</h3>
              {result.emotions.map((e,i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,margin:'3px 0'}}>
                  <span style={{width:100,fontSize:12,color:'var(--fg)'}}>{e.emotion_type}</span>
                  <div style={{flex:1,height:14,background:'var(--bg2)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{width:`${e.intensity*100}%`,height:'100%',background:e.intensity>0.5?'var(--accent)':'var(--fg3)',borderRadius:3}} />
                  </div>
                  <span style={{width:40,fontSize:11,fontFamily:'monospace',textAlign:'right'}}>{e.intensity.toFixed(3)}</span>
                  {e.context && <span style={{fontSize:10,color:'var(--fg3)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>— {e.context}</span>}
                </div>
              ))}
              <div style={{marginTop:8,fontSize:12,color:'var(--fg2)'}}>전반적 기분: {result.mood.toFixed(3)}</div>
            </div>
          )}

          {tab==='prompt' && (
            <div>
              <div className="result-box prompt-box">{result.prompt}</div>
              <button className="btn small" style={{marginTop:6}} onClick={()=>{navigator.clipboard.writeText(result.prompt);alert('복사됨')}}>프롬프트 복사</button>
            </div>
          )}

          {tab==='trace' && (
            <div>
              <div className="result-box trace-box">{result.trace.join('\n')}</div>
            </div>
          )}
        </>)}
      </div>
    </div>
  );
}

// --- App 루트 ---
function App() {
  const [npcs, setNpcs] = useState([]);
  const [rels, setRels] = useState([]);
  const [objects, setObjects] = useState([]);
  const [selectedNpc, setSelectedNpc] = useState(null);
  const [result, setResult] = useState(null);
  const [connected, setConnected] = useState(false);

  const refresh = useCallback(async () => {
    try {
      const [n, r, o] = await Promise.all([
        api.get('/api/npcs'),
        api.get('/api/relationships'),
        api.get('/api/objects'),
      ]);
      setNpcs(n); setRels(r); setObjects(o);
      setConnected(true);
    } catch(e) { setConnected(false); }
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const saveState = async () => {
    const name = prompt('저장 파일명 (확장자 없이):', 'scenario');
    if(!name) return;
    const path = `C:\\Users\\bumko\\projects\\npc-mind-rs\\data\\${name}.json`;
    const res = await fetch('/api/save', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
    if(res.ok) alert(`저장 완료: ${path}`);
    else alert('저장 실패: ' + await res.text());
  };

  const loadState = async () => {
    const name = prompt('로드 파일명 (확장자 없이):', 'scenario');
    if(!name) return;
    const path = `C:\\Users\\bumko\\projects\\npc-mind-rs\\data\\${name}.json`;
    const res = await fetch('/api/load', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});
    if(res.ok) { alert('로드 완료'); refresh(); }
    else alert('로드 실패: ' + await res.text());
  };

  return (
    <div>
      <div className="header">
        <h1>NPC Mind Engine</h1>
        <span className={`status ${connected?'ok':''}`}>{connected?'서버 연결됨':'연결 실패'} — NPC {npcs.length}개, 관계 {rels.length}개, 오브젝트 {objects.length}개</span>
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          <button className="btn small" onClick={saveState}>저장</button>
          <button className="btn small" onClick={loadState}>로드</button>
          <button className="btn small" onClick={refresh}>새로고침</button>
        </div>
      </div>
      <div className="main">
        <NpcPanel npcs={npcs} selectedNpc={selectedNpc} onSelect={setSelectedNpc} onRefresh={refresh} />
        <RelPanel rels={rels} npcs={npcs} onRefresh={refresh} />
        <ObjPanel objects={objects} onRefresh={refresh} />
      </div>
      <SituationPanel npcs={npcs} objects={objects} result={result} setResult={setResult} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
