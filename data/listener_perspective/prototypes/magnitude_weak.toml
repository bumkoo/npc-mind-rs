# 강도 Weak 프로토타입 (magnitude_weak)
#
# 청자가 체감하는 P 절대값이 작은 발화 (|P_L| < 0.15).
# 사과/간청/위로 (invert 후 약한 체감), 중립 정보 전달 포함.
#
# 분류기는 이 프로토타입들과 cosine 유사도로 "weak" 판정을 내린다.
#
# 큐레이션 원칙 (§3.3 + §3.7.4):
#   1. 명확한 사례만 (경계/혼합 발화는 테스트 케이스로)
#   2. subtype 균형 (apology/plea/condolence/neutral_info)
#   3. 1인칭 무협체, 반말 제외 (Phase 6 대기)
#   4. 테스트 케이스 핵심 어휘 회피 (누수 방지)
#
# 상세: docs/emotion/sign-classifier-design.md §3.3, §3.7.4

[meta]
language = "ko"
register = "wuxia"
version = "1"
group = "magnitude_weak"
last_updated = "2026-04-19"

[prototypes]
items = [
    # --- 사과 (apology, 표준) ---
